// ── COLOR MATCH ────────────────────────────────────────────────
const EMOJIS = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🦄","🐙","🦋","🌺","⭐","🎈","🍎","🍕"];

function ColorMatch({ config, onComplete }) {
  const numPairs = config.pairs || 6;
  const [cards, setCards] = useState(() => {
    const emojis = EMOJIS.slice(0, numPairs);
    const deck = [...emojis, ...emojis].map((e,i) => ({ id:i, emoji:e, flipped:false, matched:false }));
    for (let i=deck.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
    return deck;
  });
  const [selected, setSelected] = useState([]);
  const [moves, setMoves] = useState(0);
  const [done, setDone] = useState(false);
  const [time, setTime] = useState(0);
  const timerRef = useRef(null);

  useEffect(() => {
    timerRef.current = setInterval(() => setTime(t=>t+1), 1000);
    return () => clearInterval(timerRef.current);
  }, []);
  useEffect(() => { if(done) clearInterval(timerRef.current); }, [done]);

  const flip = (id) => {
    if (selected.length===2) return;
    const card = cards.find(c=>c.id===id);
    if (!card||card.flipped||card.matched) return;
    const newCards = cards.map(c=>c.id===id?{...c,flipped:true}:c);
    const newSel = [...selected, id];
    setCards(newCards); setSelected(newSel);
    if (newSel.length===2) {
      setMoves(m=>m+1);
      const [a,b] = newSel.map(sid=>newCards.find(c=>c.id===sid));
      if (a.emoji===b.emoji) {
        setTimeout(() => {
          setCards(prev=>prev.map(c=>newSel.includes(c.id)?{...c,matched:true}:c));
          setSelected([]);
          if (newCards.filter(c=>!c.matched).length===2) { setDone(true); onComplete&&onComplete({moves:moves+1,time}); }
        }, 500);
      } else {
        setTimeout(() => { setCards(prev=>prev.map(c=>newSel.includes(c.id)?{...c,flipped:false}:c)); setSelected([]); }, 800);
      }
    }
  };

  const cols = numPairs<=4?4:numPairs<=8?4:6;
  const s = (o) => Object.assign({},o);

  if (done) return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#6C63FF22,#4ECDC422)',borderRadius:16,color:'#fff',textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🎉'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,marginTop:8}},'Completed!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`${moves} moves · ${time} seconds`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{display:'flex',justifyContent:'center',gap:24,marginBottom:16}},
      React.createElement('span',{style:{color:'#aaa',fontSize:14}},`⏱ ${time}s`),
      React.createElement('span',{style:{color:'#aaa',fontSize:14}},`🎯 ${moves} moves`)
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:8,maxWidth:400,margin:'0 auto'}},
      ...cards.map(card =>
        React.createElement('div',{
          key:card.id, onClick:()=>flip(card.id),
          style:{width:'100%',paddingBottom:'100%',position:'relative',cursor:card.matched?'default':'pointer',borderRadius:12,transition:'transform 0.2s'}
        },
          React.createElement('div',{style:{
            position:'absolute',inset:0,borderRadius:12,
            background:card.matched?'#4ECDC422':card.flipped?'#6C63FF33':'#1e2235',
            border:card.matched?'2px solid #4ECDC4':card.flipped?'2px solid #6C63FF':'2px solid #2a2f4a',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:config.large?28:22,transition:'all 0.2s',
          }}, (card.flipped||card.matched)?card.emoji:'?')
        )
      )
    )
  );
}

const RECALL_ITEMS = ["🍎","🍌","🍇","🍓","🍑","🥝","🍍","🥭","🍒","🍋","🫐","🍉","🍊","🍈","🫒","🍆","🥕","🌽"];

function WhatsGone({ config, onComplete }) {
  const count = config.items || 5;
  const [phase, setPhase] = useState('study');
  const [items] = useState(() => [...RECALL_ITEMS].sort(()=>Math.random()-0.5).slice(0,count));
  const [removed] = useState(() => Math.floor(Math.random()*count));
  const [result, setResult] = useState(null);
  const [countdown, setCountdown] = useState(4);

  useEffect(() => {
    if (phase!=='study') return;
    const t = setInterval(() => setCountdown(c => {
      if (c<=1) { clearInterval(t); setPhase('test'); return 0; }
      return c-1;
    }), 1000);
    return () => clearInterval(t);
  }, [phase]);

  const guess = (item) => {
    const correct = item===items[removed];
    setResult(correct); setPhase('done');
    onComplete&&onComplete({correct});
  };

  if (phase==='study') return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',marginBottom:12,fontSize:14}},`Remember these items! (${countdown}s)`),
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',maxWidth:320,margin:'0 auto'}},
      ...items.map((item,i)=>React.createElement('div',{key:i,style:{fontSize:config.large?40:32,padding:8,background:'#1e2235',borderRadius:10,border:'2px solid #2a2f4a'}},item))
    )
  );
  if (phase==='test') return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#FFB347',marginBottom:16,fontWeight:600}},"What's missing?"),
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',maxWidth:320,margin:'0 auto 20px'}},
      ...items.filter((_,i)=>i!==removed).map((item,i)=>React.createElement('div',{key:i,style:{fontSize:config.large?40:32,padding:8,background:'#1e2235',borderRadius:10,border:'2px solid #2a2f4a'}},item))
    ),
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:12}},'Tap the missing item:'),
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',maxWidth:320,margin:'0 auto'}},
      ...[...items].sort(()=>Math.random()-0.5).map((item,i)=>
        React.createElement('button',{key:i,onClick:()=>guess(item),style:{fontSize:config.large?36:28,padding:'8px 12px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,cursor:'pointer'}},item)
      )
    )
  );
  return React.createElement('div',{style:{padding:24,background:result?'#4ECDC422':'#FF6B6B22',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},result?'✅':'❌'),
    React.createElement('div',{style:{fontSize:20,fontWeight:700,color:'#fff',marginTop:8}},result?'Correct!':'Not quite!'),
    !result&&React.createElement('div',{style:{color:'#aaa',marginTop:8}},`The missing item was ${items[removed]}`)
  );
}

// ── CLOCK READING (Time Awareness) ────────────────────────────
function ClockReading({ config, onComplete }) {
  const rounds = config.rounds||5;
  const makeTime = () => {
    const h = Math.floor(Math.random()*12)+1;
    const mOpts = config.difficulty==='easy'?[0,30]:config.difficulty==='medium'?[0,15,30,45]:[0,5,10,15,20,25,30,35,40,45,50,55];
    const m = mOpts[Math.floor(Math.random()*mOpts.length)];
    return {h,m};
  };
  const [times] = useState(()=>Array.from({length:rounds},makeTime));
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const t = times[idx];

  const makeOpts = (h,m) => {
    const fmt = (hh,mm) => `${hh}:${String(mm).padStart(2,'0')}`;
    const correct = fmt(h,m);
    const wrongs = new Set();
    while(wrongs.size<3){
      const fh = Math.floor(Math.random()*12)+1;
      const fm = [0,15,30,45][Math.floor(Math.random()*4)];
      const s = fmt(fh,fm);
      if(s!==correct) wrongs.add(s);
    }
    return [correct,...wrongs].sort(()=>Math.random()-0.5);
  };
  const [opts] = useState(()=>times.map(t=>makeOpts(t.h,t.m)));

  const choose = (opt) => {
    if(picked) return; setPicked(opt);
    const correct = opt===`${t.h}:${String(t.m).padStart(2,'0')}`;
    if(correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1>=rounds){setDone(true);onComplete&&onComplete({score:score+(correct?1:0),total:rounds});}
      else{setIdx(i=>i+1);setPicked(null);}
    },1000);
  };

  // SVG analog clock
  const r = 80;
  const cx = 90, cy = 90;
  const hAngle = ((t.h%12)/12)*360 + (t.m/60)*30 - 90;
  const mAngle = (t.m/60)*360 - 90;
  const toRad = deg => deg*Math.PI/180;
  const hx = cx + 50*Math.cos(toRad(hAngle)), hy = cy + 50*Math.sin(toRad(hAngle));
  const mx = cx + 70*Math.cos(toRad(mAngle)), my = cy + 70*Math.sin(toRad(mAngle));

  if(done) return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#6C63FF22,#4ECDC422)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'⏰'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'Time Master!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`${score}/${rounds} correct`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:12}},`Clock ${idx+1} of ${rounds} · Score: ${score}`),
    React.createElement('svg',{width:180,height:180,style:{margin:'0 auto',display:'block',marginBottom:20}},
      React.createElement('circle',{cx,cy,r,fill:'#1e2235',stroke:'#6C63FF',strokeWidth:3}),
      ...[12,3,6,9].map((n,i)=>{
        const a = (i/4)*360-90; const rx=cx+65*Math.cos(toRad(a)), ry=cy+65*Math.sin(toRad(a));
        return React.createElement('text',{key:n,x:rx,y:ry,textAnchor:'middle',dominantBaseline:'middle',fill:'#aaa',fontSize:13,fontWeight:'bold'},n);
      }),
      Array.from({length:60},(_,i)=>{
        const a=(i/60)*360-90; const inner=i%5===0?68:72; const outer=78;
        return React.createElement('line',{key:i,x1:cx+inner*Math.cos(toRad(a)),y1:cy+inner*Math.sin(toRad(a)),x2:cx+outer*Math.cos(toRad(a)),y2:cy+outer*Math.sin(toRad(a)),stroke:i%5===0?'#6C63FF55':'#2a2f4a',strokeWidth:i%5===0?2:1});
      }),
      React.createElement('line',{x1:cx,y1:cy,x2:hx,y2:hy,stroke:'#fff',strokeWidth:5,strokeLinecap:'round'}),
      React.createElement('line',{x1:cx,y1:cy,x2:mx,y2:my,stroke:'#4ECDC4',strokeWidth:3,strokeLinecap:'round'}),
      React.createElement('circle',{cx,cy,r:5,fill:'#6C63FF'})
    ),
    React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:13,marginBottom:12}},'🕐 What time does this clock show?'),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:280,margin:'0 auto'}},
      ...opts[idx].map((opt,i)=>{
        const isCorrect = opt===`${t.h}:${String(t.m).padStart(2,'0')}`;
        let bg='#1e2235',border='#2a2f4a',color='#e0e0ff';
        if(picked){if(isCorrect){bg='#4ECDC422';border='#4ECDC4';}else if(opt===picked){bg='#FF6B6B22';border='#FF6B6B';}}
        return React.createElement('button',{key:i,onClick:()=>choose(opt),style:{padding:'14px',background:bg,border:`2px solid ${border}`,borderRadius:12,color,fontSize:config.large?18:16,cursor:picked?'default':'pointer',fontWeight:700,fontFamily:'monospace',transition:'all 0.2s'}},opt);
      })
    )
  );
}

// ── SIMON SAYS (Color Sequence) ────────────────────────────────
const SIMON_COLORS = [
  {id:'red',    bg:'#FF6B6B', lit:'#ff2222', label:'Red'},
  {id:'green',  bg:'#4ECDC4', lit:'#00ffee', label:'Green'},
  {id:'blue',   bg:'#6C63FF', lit:'#aa99ff', label:'Blue'},
  {id:'yellow', bg:'#FFB347', lit:'#ffdd00', label:'Yellow'},
];

function SimonSays({ config, onComplete }) {
  const maxRounds = config.rounds || 5;
  const speed     = config.speed  || 800;
  const [sequence, setSequence] = useState([]);
  const [userSeq,  setUserSeq]  = useState([]);
  const [phase,    setPhase]    = useState('start'); // start|show|input|fail|win
  const [lit,      setLit]      = useState(null);
  const [round,    setRound]    = useState(0);
  const [score,    setScore]    = useState(0);

  const flashSeq = (seq) => {
    setPhase('show');
    let i = 0;
    const next = () => {
      if (i >= seq.length) { setTimeout(()=>setPhase('input'), 400); return; }
      setLit(seq[i]);
      setTimeout(()=>{ setLit(null); setTimeout(()=>{ i++; next(); }, 200); }, speed);
    };
    setTimeout(next, 500);
  };

  const startRound = (seq) => {
    const newSeq = [...seq, SIMON_COLORS[Math.floor(Math.random()*4)].id];
    setSequence(newSeq); setUserSeq([]); setRound(newSeq.length);
    flashSeq(newSeq);
  };

  const handlePress = (id) => {
    if (phase !== 'input') return;
    const next = [...userSeq, id];
    const idx  = next.length - 1;
    if (next[idx] !== sequence[idx]) { setPhase('fail'); onComplete&&onComplete({score:round-1,total:maxRounds}); return; }
    if (next.length === sequence.length) {
      const newScore = score + 1;
      setScore(newScore);
      if (sequence.length >= maxRounds) { setPhase('win'); onComplete&&onComplete({score:newScore,total:maxRounds}); return; }
      setUserSeq([]);
      setTimeout(() => startRound(sequence), 800);
    } else { setUserSeq(next); }
  };

  if (phase==='start') return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',marginBottom:20,fontSize:15}},'Watch the sequence, then repeat it!'),
    React.createElement('button',{onClick:()=>startRound([]),style:{padding:'14px 32px',background:'linear-gradient(135deg,#6C63FF,#4ECDC4)',border:'none',borderRadius:14,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer'}},'Start Game')
  );
  if (phase==='fail') return React.createElement('div',{style:{padding:24,background:'#FF6B6B22',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'❌'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'Wrong!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`You reached round ${round-1} of ${maxRounds}`)
  );
  if (phase==='win') return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#6C63FF22,#4ECDC422)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🎉'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'You Won!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`Completed all ${maxRounds} rounds!`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:8}},phase==='show'?`Watch carefully... (Round ${round})`:`Your turn! Repeat the sequence (Round ${round})`),
    React.createElement('div',{style:{color:'#666',fontSize:12,marginBottom:20}},`Progress: ${userSeq.length}/${sequence.length}`),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:280,margin:'0 auto'}},
      ...SIMON_COLORS.map(c=>React.createElement('button',{
        key:c.id, onClick:()=>handlePress(c.id),
        style:{height:100,borderRadius:16,border:'none',cursor:phase==='input'?'pointer':'default',
          background:lit===c.id?c.lit:c.bg,
          opacity:lit&&lit!==c.id?0.4:1,
          transform:lit===c.id?'scale(1.08)':'scale(1)',
          transition:'all 0.15s',boxShadow:lit===c.id?`0 0 24px ${c.lit}`:'none',
          fontSize:14,fontWeight:700,color:'#0a0e1a'},
      },c.label))
    )
  );
}

// ── SPATIAL RECALL ─────────────────────────────────────────────
function SpatialRecall({ config, onComplete }) {
  const gridSize  = config.grid  || 4;
  const numTiles  = config.tiles || 4;
  const totalCells = gridSize * gridSize;
  const [targets]  = useState(() => {
    const cells = Array.from({length:totalCells},(_,i)=>i);
    return cells.sort(()=>Math.random()-0.5).slice(0,numTiles);
  });
  const [phase,    setPhase]    = useState('study');
  const [selected, setSelected] = useState([]);
  const [submitted,setSubmitted]= useState(false);
  const [countdown,setCountdown]= useState(3);

  useEffect(()=>{
    if (phase!=='study') return;
    const t = setInterval(()=>setCountdown(c=>{
      if(c<=1){clearInterval(t);setPhase('recall');return 0;}
      return c-1;
    }),1000);
    return ()=>clearInterval(t);
  },[phase]);

  const toggle = (i) => {
    if (submitted) return;
    setSelected(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);
  };

  const check = () => {
    setSubmitted(true);
    const correct = targets.every(t=>selected.includes(t)) && selected.every(t=>targets.includes(t));
    const score = targets.filter(t=>selected.includes(t)).length;
    onComplete&&onComplete({score,total:numTiles});
  };

  const cellStyle = (i) => {
    const isTarget   = targets.includes(i);
    const isSelected = selected.includes(i);
    if (phase==='study') return {background:isTarget?'#6C63FF':'#1e2235',border:isTarget?'2px solid #9b95ff':'2px solid #2a2f4a'};
    if (!submitted) return {background:isSelected?'#FFB34766':'#1e2235',border:isSelected?'2px solid #FFB347':'2px solid #2a2f4a',cursor:'pointer'};
    if (isTarget&&isSelected) return {background:'#4ECDC466',border:'2px solid #4ECDC4'};
    if (isTarget&&!isSelected) return {background:'#FF6B6B44',border:'2px solid #FF6B6B'};
    if (!isTarget&&isSelected) return {background:'#FF6B6B22',border:'2px solid #FF6B6B55'};
    return {background:'#1e2235',border:'2px solid #2a2f4a'};
  };

  const correctCount = submitted ? targets.filter(t=>selected.includes(t)).length : 0;

  return React.createElement('div',{style:{textAlign:'center'}},
    phase==='study'&&React.createElement('div',{style:{color:'#FFB347',fontWeight:600,marginBottom:12,fontSize:14}},`Remember the highlighted cells! (${countdown}s)`),
    phase==='recall'&&!submitted&&React.createElement('div',{style:{color:'#aaa',marginBottom:12,fontSize:14}},`Tap the ${numTiles} cells you saw`),
    submitted&&React.createElement('div',{style:{color:correctCount===numTiles?'#4ECDC4':'#FFB347',fontWeight:600,marginBottom:12,fontSize:14}},`${correctCount}/${numTiles} correct!`),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:`repeat(${gridSize},1fr)`,gap:6,maxWidth:300,margin:'0 auto 16px'}},
      ...Array.from({length:totalCells},(_,i)=>React.createElement('div',{
        key:i, onClick:()=>phase==='recall'&&toggle(i),
        style:{paddingBottom:'100%',position:'relative',borderRadius:8,transition:'all 0.2s'}
      },
        React.createElement('div',{style:{position:'absolute',inset:0,borderRadius:8,transition:'all 0.2s',...cellStyle(i)}})
      ))
    ),
    phase==='recall'&&!submitted&&React.createElement('button',{
      onClick:check,
      style:{padding:'10px 28px',background:'linear-gradient(135deg,#6C63FF,#4ECDC4)',border:'none',borderRadius:12,color:'#fff',fontWeight:700,cursor:'pointer',fontSize:15}
    },'Submit')
  );
}

// ── MENTAL MATH ────────────────────────────────────────────────
function MentalMath({ config, onComplete }) {
  const ops     = config.ops    || ['+','-'];
  const maxNum  = config.maxNum || 10;
  const rounds  = config.rounds || 5;

  const makeQ = () => {
    const op  = ops[Math.floor(Math.random()*ops.length)];
    let a = Math.floor(Math.random()*maxNum)+1;
    let b = Math.floor(Math.random()*maxNum)+1;
    if (op==='-' && b>a) [a,b]=[b,a];
    const ans = op==='+'?a+b:op==='-'?a-b:op==='×'?a*b:Math.floor(a/b);
    return {q:`${a} ${op} ${b} = ?`, ans};
  };

  const [questions] = useState(()=>Array.from({length:rounds},makeQ));
  const [idx,      setIdx]      = useState(0);
  const [input,    setInput]    = useState('');
  const [feedback, setFeedback] = useState(null);
  const [score,    setScore]    = useState(0);
  const [done,     setDone]     = useState(false);
  const [startTime]=useState(()=>Date.now());

  const submit = () => {
    if (!input.trim()) return;
    const correct = parseInt(input.trim())===questions[idx].ans;
    setFeedback(correct?'correct':'wrong');
    if(correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1>=questions.length){setDone(true);onComplete&&onComplete({score:score+(correct?1:0),total:rounds,time:Math.round((Date.now()-startTime)/1000)});}
      else{setIdx(i=>i+1);setInput('');setFeedback(null);}
    },700);
  };

  if(done) return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#FFB34722,#FF6B6B22)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🧮'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'Well done!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`${score}/${rounds} correct`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:20}},`Question ${idx+1} of ${rounds} · Score: ${score}`),
    React.createElement('div',{style:{fontSize:config.large?42:36,fontWeight:800,color:'#FFB347',marginBottom:24,letterSpacing:2}},questions[idx].q),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:240,margin:'0 auto 12px'}},
      React.createElement('input',{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&submit(),placeholder:'Answer...',type:'number',autoFocus:true,
        style:{flex:1,padding:'12px 14px',background:'#1e2235',border:feedback==='correct'?'2px solid #4ECDC4':feedback==='wrong'?'2px solid #FF6B6B':'2px solid #2a2f4a',borderRadius:10,color:'#fff',fontSize:config.large?20:18,outline:'none',textAlign:'center'}}),
      React.createElement('button',{onClick:submit,style:{padding:'12px 18px',background:'#FFB347',border:'none',borderRadius:10,color:'#0a0e1a',cursor:'pointer',fontWeight:700,fontSize:16}},'✓')
    ),
    feedback&&React.createElement('div',{style:{color:feedback==='correct'?'#4ECDC4':'#FF6B6B',fontWeight:600,fontSize:15,marginTop:4}},
      feedback==='correct'?'✓ Correct!':`✗ Answer was ${questions[idx].ans}`)
  );
}

    {words:["Baroque","Rococo","Cubism","Gothic"],        odd:"Cubism",      reason:"Not an architectural style"},
    {words:["Serotonin","Dopamine","Cortisol","Insulin"], odd:"Insulin",     reason:"Not a brain neurotransmitter"},

function WordAssociation({ config, onComplete }) {
  const bank = WA_SETS[config.difficulty]||WA_SETS.easy;
  const [questions] = useState(()=>[...bank].sort(()=>Math.random()-0.5).slice(0,4));
  const [idx,      setIdx]      = useState(0);
  const [picked,   setPicked]   = useState(null);
  const [score,    setScore]    = useState(0);
  const [done,     setDone]     = useState(false);
  const q = questions[idx];
  const [shuffled] = useState(()=>questions.map(qi=>[...qi.words].sort(()=>Math.random()-0.5)));

  const choose = (word) => {
    if (picked) return;
    setPicked(word);
    const correct = word===q.odd;
    if(correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(idx+1>=questions.length){setDone(true);onComplete&&onComplete({score:score+(correct?1:0),total:questions.length});}
      else{setIdx(i=>i+1);setPicked(null);}
    },1200);
  };

  if(done) return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#FF6B6B22,#FFB34722)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🔤'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'Complete!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`${score}/${questions.length} correct`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:16}},`Question ${idx+1} of ${questions.length} · Score: ${score}`),
    React.createElement('div',{style:{color:'#fff',fontWeight:600,fontSize:16,marginBottom:20}},'Which word does NOT belong?'),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:340,margin:'0 auto'}},
      ...shuffled[idx].map((word,i)=>{
        let bg='#1e2235',border='#2a2f4a',color='#e0e0ff';
        if(picked){
          if(word===q.odd){bg='#4ECDC422';border='#4ECDC4';}
          else if(word===picked){bg='#FF6B6B22';border='#FF6B6B';}
        }
        return React.createElement('button',{key:i,onClick:()=>choose(word),
          style:{padding:'14px 10px',background:bg,border:`2px solid ${border}`,borderRadius:12,color,fontSize:config.large?16:15,cursor:picked?'default':'pointer',fontWeight:600,transition:'all 0.2s'}
        },word);
      })
    ),
    picked&&React.createElement('div',{style:{marginTop:16,color:picked===q.odd?'#4ECDC4':'#FF6B6B',fontSize:13,fontWeight:600}},
      picked===q.odd?`✓ Correct! ${q.reason}`:`✗ "${q.odd}" was the odd one — ${q.reason}`)
  );
}

// ── DIGIT SPAN (Recall) ────────────────────────────────────────
function DigitSpan({ config, onComplete }) {
  const startLen = config.startLen||3;
  const maxLen   = config.maxLen||8;
  const [len,    setLen]    = useState(startLen);
  const [digits, setDigits] = useState(()=>Array.from({length:startLen},()=>Math.floor(Math.random()*10)));
  const [phase,  setPhase]  = useState('show'); // show|input|result
  const [input,  setInput]  = useState('');
  const [lives,  setLives]  = useState(3);
  const [score,  setScore]  = useState(0);
  const [done,   setDone]   = useState(false);
  const [showIdx,setShowIdx]= useState(0);

  useEffect(()=>{
    if(phase!=='show') return;
    setShowIdx(0);
    const interval = setInterval(()=>{
      setShowIdx(i=>{
        if(i>=digits.length-1){clearInterval(interval);setTimeout(()=>setPhase('input'),600);return i;}
        return i+1;
      });
    },800);
    return ()=>clearInterval(interval);
  },[phase,digits]);

  const submit = () => {
    const correct = input.trim()===digits.join('');
    if(correct){
      setScore(s=>s+1);
      if(len>=maxLen){setDone(true);onComplete&&onComplete({score:score+1,total:maxLen-startLen+1});return;}
      const newLen = len+1;
      setLen(newLen);
      setDigits(Array.from({length:newLen},()=>Math.floor(Math.random()*10)));
      setInput(''); setPhase('show');
    } else {
      const newLives = lives-1;
      setLives(newLives);
      if(newLives<=0){setDone(true);onComplete&&onComplete({score,total:maxLen-startLen+1});return;}
      setDigits(Array.from({length:len},()=>Math.floor(Math.random()*10)));
      setInput(''); setPhase('show');
    }
  };

  if(done) return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#FF6B6B22,#6C63FF22)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🔢'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},score>3?'Excellent Memory!':'Good Try!'),
    React.createElement('div',{style:{color:'#aaa',marginTop:8}},`Reached ${len} digits · Score: ${score}`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{display:'flex',justifyContent:'center',gap:16,marginBottom:16}},
      React.createElement('span',{style:{color:'#aaa',fontSize:13}},`Length: ${len}`),
      React.createElement('span',{style:{color:'#FF6B6B',fontSize:13}},`${'❤️'.repeat(lives)}`),
      React.createElement('span',{style:{color:'#4ECDC4',fontSize:13}},`Score: ${score}`)
    ),
    phase==='show'&&React.createElement('div',null,
      React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:14,marginBottom:16}},'Remember this sequence!'),
      React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
        ...digits.map((d,i)=>React.createElement('div',{key:i,style:{
          width:52,height:52,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:config.large?26:22,fontWeight:800,
          background:i===showIdx?'#6C63FF':'#1e2235',
          border:i===showIdx?'2px solid #9b95ff':'2px solid #2a2f4a',
          color:i===showIdx?'#fff':'#333',
          transition:'all 0.3s'
        }},i<=showIdx?d:''))
      )
    ),
    phase==='input'&&React.createElement('div',null,
      React.createElement('div',{style:{color:'#4ECDC4',fontWeight:600,fontSize:14,marginBottom:16}},'Type the digits you saw:'),
      React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:260,margin:'0 auto 12px'}},
        React.createElement('input',{value:input,onChange:e=>setInput(e.target.value.replace(/\D/g,'')),onKeyDown:e=>e.key==='Enter'&&submit(),
          placeholder:'Enter digits...',maxLength:maxLen,autoFocus:true,
          style:{flex:1,padding:'12px 14px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,color:'#fff',fontSize:config.large?22:18,outline:'none',textAlign:'center',letterSpacing:4,fontFamily:'monospace'}}),
        React.createElement('button',{onClick:submit,style:{padding:'12px 16px',background:'#4ECDC4',border:'none',borderRadius:10,color:'#0a0e1a',cursor:'pointer',fontWeight:700}},'✓')
      )
    )
  );
}

function SentenceBuilder({ config, onComplete }) {
  const bank = SENTENCES[config.difficulty]||SENTENCES.easy;
  const [sentences] = useState(()=>[...bank].sort(()=>Math.random()-0.5).slice(0,4));
  const [idx, setIdx] = useState(0);

  const [wordSets] = useState(()=>sentences.map(s=>[...s.words].sort(()=>Math.random()-0.5)));

  useEffect(()=>{
    setPlaced([]); setFeedback(null);
  },[idx]);

  const addWord = (word, wi) => {
    if(feedback) return;
    setPlaced(p=>[...p,{word,wi}]);
  };
  const removeWord = (wi) => {
    if(feedback) return;
    setPlaced(p=>p.filter((_,i)=>i!==wi));
  };

  const check = () => {
    const attempt = placed.map(p=>p.word).join(' ');

  return React.createElement('div',null,

      ...wordSets[idx].map((word,wi)=>!usedIndices.includes(wi)?
        React.createElement('button',{key:wi,onClick:()=>addWord(word,wi),
          style:{padding:'8px 14px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:8,color:'#e0e0ff',cursor:'pointer',fontSize:config.large?15:13,fontWeight:600,transition:'all 0.15s'}},word)

  const bank = SUDOKU_PUZZLES[config.size==='4x4'?'easy':'easy'];
  const [puzzle] = useState(()=>bank[Math.floor(Math.random()*bank.length)]);

  const set = (r,c,v) => {
    if(puzzle.grid[r][c]!==0) return;
    const g = userGrid.map(row=>[...row]);
    g[r][c] = g[r][c]===v?0:v;
    setUserGrid(g);

    g.forEach((row,ri)=>row.forEach((cell,ci)=>{
      if(cell!==0&&cell!==puzzle.solution[ri][ci]) errs.push(`${ri},${ci}`);
    }));
    setErrors(errs);
    // check solved
    const complete = g.every((row,ri)=>row.every((cell,ci)=>cell===puzzle.solution[ri][ci]));

// ── N-BACK (Recall) ────────────────────────────────────────────
function NBack({ config, onComplete }) {
  const n = config.n||2;
  const totalTrials = config.trials||15;
  const [sequence] = useState(()=>{
    const letters = 'ABCDEFGHIJKLMNOP'.split('');
    return Array.from({length:totalTrials},()=>letters[Math.floor(Math.random()*6)]);
  });
  const [trial, setTrial] = useState(0);
  const [showing, setShowing] = useState(false);
  const [current, setCurrent] = useState(null);
  const [responses, setResponses] = useState([]);
  const [phase, setPhase] = useState('ready');
  const [hits, setHits] = useState(0);
  const [misses, setMisses] = useState(0);
  const [fas, setFas] = useState(0); // false alarms

  const runTrial = (t) => {
    if(t>=sequence.length){setPhase('done');onComplete&&onComplete({score:hits,total:totalTrials});return;}
    setCurrent(sequence[t]); setShowing(true); setPhase('respond');
    setTimeout(()=>{ setShowing(false); setTimeout(()=>{ handleNoResponse(t); }, 500); }, 1200);
  };

  const handleNoResponse = (t) => {
    const isMatch = t>=n && sequence[t]===sequence[t-n];
    if(isMatch) setMisses(m=>m+1);
    setTrial(t2=>{ const next=t2+1; setTimeout(()=>runTrial(next),300); return next; });
  };

  const respond = () => {
    if(phase!=='respond') return;
    const t = trial;
    const isMatch = t>=n && sequence[t]===sequence[t-n];
    if(isMatch){setHits(h=>h+1);}else{setFas(f=>f+1);}
    setPhase('wait');
    setTrial(t2=>{ const next=t2+1; setTimeout(()=>runTrial(next),500); return next; });
  };

  useEffect(()=>{ if(phase==='ready') setTimeout(()=>runTrial(0),500); },[]);

  if(phase==='done') return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#6C63FF22,#FF6B6B22)',borderRadius:16,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48}},'🎯'),
    React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},`${n}-Back Complete!`),
    React.createElement('div',{style:{color:'#4ECDC4',marginTop:8}},`✓ Hits: ${hits}`),
    React.createElement('div',{style:{color:'#FF6B6B',marginTop:4}},`✗ Misses: ${misses} · False alarms: ${fas}`)
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:8}},`${n}-Back · Trial ${trial+1}/${totalTrials}`),

function SpotDifference({ config, onComplete }) {
  const [scene] = useState(()=>DIFF_SCENES[Math.floor(Math.random()*DIFF_SCENES.length)]);
  const [phase, setPhase] = useState('study');
  const [found, setFound] = useState([]);
  const [selected, setSelected] = useState(null);
  const [done, setDone] = useState(false);
  const [countdown, setCountdown] = useState(5);

  useEffect(()=>{
    if(phase!=='study') return;
    const t = setInterval(()=>setCountdown(c=>{
      if(c<=1){clearInterval(t);setPhase('compare');return 0;}
      return c-1;
    }),1000);
    return ()=>clearInterval(t);
  },[phase]);

  const checkDiff = (i) => {
    if(done) return;
    const isDiff = scene.original[i]!==scene.changed[i];
    if(isDiff&&!found.includes(i)){
      const newFound = [...found,i];
      setFound(newFound);
      if(newFound.length>=3){setDone(true);onComplete&&onComplete({score:3,total:3});}
    }
    setSelected(i);
    setTimeout(()=>setSelected(null),600);
  };

  if(phase==='study') return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:14,marginBottom:12}},`Study this scene carefully! (${countdown}s)`),

    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6,maxWidth:340,margin:'0 auto'}},

    )
  );

  return React.createElement('div',null,
    React.createElement('div',{style:{color:'#4ECDC4',fontWeight:600,fontSize:13,marginBottom:4,textAlign:'center'}},'Tap the items that are DIFFERENT from what you saw:'),
    React.createElement('div',{style:{color:'#555',fontSize:12,marginBottom:12,textAlign:'center'}},`Found ${found.length}/3 differences`),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
      ...scene.changed.map((item,i)=>{
        const isFound = found.includes(i);
        const isSel = selected===i;
        return React.createElement('button',{key:i,onClick:()=>checkDiff(i),
          style:{padding:'10px 10px',background:isFound?'#4ECDC422':isSel?'#FF6B6B22':'#1e2235',
            border:`2px solid ${isFound?'#4ECDC4':isSel?'#FF6B6B':'#2a2f4a'}`,
            borderRadius:10,color:isFound?'#4ECDC4':'#e0e0ff',cursor:'pointer',fontSize:config.large?14:12,textAlign:'left',transition:'all 0.2s'}},
          (isFound?'✓ ':'')+item);
      })
    ),
    done&&React.createElement('div',{style:{marginTop:16,padding:16,background:'linear-gradient(135deg,#4ECDC422,#6C63FF22)',borderRadius:12,textAlign:'center'}},
      React.createElement('div',{style:{fontSize:36}},'🎉'),
      React.createElement('div',{style:{color:'#4ECDC4',fontWeight:700,marginTop:4}},'All 3 differences found!')
    )
  );
}

function JigsawPreview({ config, onComplete }) {
  const [image] = useState(()=>JIGSAW_IMAGES[Math.floor(Math.random()*JIGSAW_IMAGES.length)]);
  const [phase, setPhase] = useState('study');
  const [pieces, setPieces] = useState(()=>image.emoji.map((e,i)=>({emoji:e,correct:i})));
  const [selected, setSelected] = useState(null);
  const [moves, setMoves] = useState(0);
  const [solved, setSolved] = useState(false);
  const [countdown, setCountdown] = useState(config.studyTime||5);

  useEffect(()=>{
    if(phase!=='study') return;
    const t = setInterval(()=>setCountdown(c=>{
      if(c<=1){
        clearInterval(t);
        setPieces(prev=>{
          const arr=[...prev];
          for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
          return arr;
        });
        setPhase('play');
        return 0;
      }
      return c-1;
    }),1000);
    return ()=>clearInterval(t);
  },[phase]);

  const tap = (i) => {
    if(phase!=='play'||solved) return;
    if(selected===null){setSelected(i);return;}
    if(selected===i){setSelected(null);return;}
    setPieces(prev=>{
      const arr=[...prev];
      [arr[selected],arr[i]]=[arr[i],arr[selected]];
      if(arr.every((p,idx)=>p.correct===idx)){setSolved(true);onComplete&&onComplete({score:1,total:1,moves:moves+1});}
      return arr;
    });
    setMoves(m=>m+1);
    setSelected(null);
  };

  if(phase==='study') return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:14,marginBottom:8}},`Memorise the layout! (${countdown}s)`),
    React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'#fff',marginBottom:12}},image.name),
    React.createElement('div',{style:{display:'inline-grid',gridTemplateColumns:`repeat(${image.cols},1fr)`,gap:3,background:'#6C63FF',padding:3,borderRadius:12}},
      ...image.emoji.map((e,i)=>React.createElement('div',{key:i,style:{width:54,height:54,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,background:'#1e2235',borderRadius:6}},e))
    )
  );

  return React.createElement('div',{style:{textAlign:'center'}},
    solved
      ? React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#6C63FF22,#4ECDC422)',borderRadius:16}},
          React.createElement('div',{style:{fontSize:48}},'🎉'),
          React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},'Puzzle Solved!'),
          React.createElement('div',{style:{color:'#aaa',marginTop:8}},`Completed in ${moves} swaps`)
        )
      : React.createElement('div',null,
          React.createElement('div',{style:{color:'#aaa',fontSize:13,marginBottom:4}},`Restore the original layout · ${moves} swaps`),
          React.createElement('div',{style:{color:'#555',fontSize:12,marginBottom:10}},'Tap two pieces to swap them'),
          React.createElement('div',{style:{display:'inline-grid',gridTemplateColumns:`repeat(${image.cols},1fr)`,gap:3,background:selected!==null?'#FFB347':'#2a2f4a',padding:3,borderRadius:12,transition:'background 0.2s'}},
            ...pieces.map((p,i)=>React.createElement('div',{key:i,onClick:()=>tap(i),
              style:{width:54,height:54,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,
                background:selected===i?'#FFB34733':p.correct===i?'#4ECDC411':'#1e2235',
                borderRadius:6,cursor:'pointer',border:selected===i?'2px solid #FFB347':p.correct===i?'2px solid #4ECDC433':'2px solid transparent',
                transition:'all 0.15s'}},p.emoji))
          ),
          React.createElement('div',{style:{marginTop:10,color:'#555',fontSize:12}},
            `✓ ${pieces.filter((p,i)=>p.correct===i).length}/${pieces.length} in place`)
        )
  );
}

function CategoryFluency({ config, onComplete }) {
  const bank = CATEGORIES[config.difficulty]||CATEGORIES.easy;
  const [cat] = useState(()=>bank[Math.floor(Math.random()*bank.length)]);
  const [timeLeft, setTimeLeft] = useState(30);
  const [phase, setPhase] = useState('play');
  const [words, setWords] = useState(()=>{
    const pool = [...cat.valid.slice(0,10),...cat.invalid.slice(0,5)].sort(()=>Math.random()-0.5);
    return pool.map(w=>({word:w,tapped:false,correct:null}));
  });
  const [score, setScore] = useState(0);

  useEffect(()=>{
    if(phase!=='play') return;
    const t = setInterval(()=>setTimeLeft(s=>{
      if(s<=1){clearInterval(t);setPhase('done');
        const correct = words.filter(w=>w.tapped&&cat.valid.includes(w.word)).length;
        const wrong   = words.filter(w=>w.tapped&&!cat.valid.includes(w.word)).length;
        onComplete&&onComplete({score:correct-wrong,total:cat.valid.slice(0,10).length});
        return 0;}
      return s-1;
    }),1000);
    return ()=>clearInterval(t);
  },[phase]);

  const tap = (i) => {
    if(phase!=='play') return;
    setWords(prev=>{
      const arr=[...prev];
      if(arr[i].tapped) return arr;
      const isValid = cat.valid.includes(arr[i].word);
      arr[i]={...arr[i],tapped:true,correct:isValid};
      setScore(s=>s+(isValid?1:-1));
      return arr;
    });
  };

  const colorScheme = timeLeft>10?'#4ECDC4':timeLeft>5?'#FFB347':'#FF6B6B';

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'#fff'}},cat.category),
      React.createElement('div',{style:{fontSize:20,fontWeight:800,color:colorScheme}},`${timeLeft}s`)
    ),
    phase==='play'&&React.createElement('div',{style:{color:'#aaa',fontSize:12,marginBottom:14}},'Tap ONLY words that belong to this category!'),
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:16}},
      ...words.map((w,i)=>{
        let bg='#1e2235',border='#2a2f4a',color='#e0e0ff';
        if(w.tapped){bg=w.correct?'#4ECDC422':'#FF6B6B22';border=w.correct?'#4ECDC4':'#FF6B6B';color=w.correct?'#4ECDC4':'#FF6B6B';}
        return React.createElement('button',{key:i,onClick:()=>tap(i),
          style:{padding:'9px 16px',background:bg,border:`2px solid ${border}`,borderRadius:20,color,fontSize:config.large?15:13,cursor:w.tapped||phase!=='play'?'default':'pointer',fontWeight:600,transition:'all 0.2s'}},
          w.tapped?(w.correct?'✓ ':'✗ ')+w.word:w.word);
      })
    ),
    phase==='play'&&React.createElement('div',{style:{color:'#555',fontSize:13}},`Score: ${score}`),
    phase==='done'&&React.createElement('div',{style:{padding:20,background:'linear-gradient(135deg,#4ECDC422,#6C63FF22)',borderRadius:14}},
      React.createElement('div',{style:{fontSize:36}},'⏱️'),
      React.createElement('div',{style:{fontSize:20,fontWeight:700,color:'#fff',marginTop:6}},'Time\'s up!'),
      React.createElement('div',{style:{color:'#aaa',marginTop:4}},`Final score: ${score}`)
    )
  );
}

  const [level, setLevel] = useState(null);
  const [playing, setPlaying] = useState(null);
  const reset = () => { setAge(null); setDomain(null); setLevel(null); setPlaying(null); };
  const currentGame = age&&domain&&level ? (GAMES[domain]&&GAMES[domain][age]&&GAMES[domain][age][level]) : null;
  const step = playing?4:domain&&level?3:domain?2:age?1:0;

  return React.createElement('div',{style:{minHeight:'100vh',background:'#0a0e1a',fontFamily:"'Segoe UI',system-ui,sans-serif",padding:'24px 16px',color:'#e0e0ff'}},

    React.createElement('div',{style:{maxWidth:560,margin:'0 auto 28px'}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12}},
          React.createElement('img',{src:LOGO_SRC,alt:'mhitr',style:{height:48,width:'auto',objectFit:'contain'}}),
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:15,fontWeight:800,color:'#6C63FF',letterSpacing:1}},'Cognicare'),
            React.createElement('div',{style:{fontSize:10,color:'#555',marginTop:1}},'Vasudhaiva Kutumbakam Software Solutions Pvt. Ltd.')
          )
        ),
        step>0&&!playing&&React.createElement('button',{onClick:reset,style:{background:'none',border:'1px solid #2a2f4a',borderRadius:8,color:'#666',cursor:'pointer',fontSize:12,padding:'6px 12px'}},'Start Over')
      ),
      step>0&&React.createElement('div',{style:{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}},
        age&&React.createElement('span',{style:{padding:'3px 10px',background:'#1e2235',borderRadius:20,fontSize:12,color:'#4ECDC4'}},`${(AGE_GROUPS.find(a=>a.id===age)||{}).icon} ${(AGE_GROUPS.find(a=>a.id===age)||{}).label}`),
        domain&&React.createElement('span',{style:{padding:'3px 10px',background:'#1e2235',borderRadius:20,fontSize:12,color:'#6C63FF'}},`${(DOMAINS.find(d=>d.id===domain)||{}).icon} ${(DOMAINS.find(d=>d.id===domain)||{}).label}`),
        level&&React.createElement('span',{style:{padding:'3px 10px',background:'#1e2235',borderRadius:20,fontSize:12,color:'#FFB347'}},(LEVELS.find(l=>l.id===level)||{}).label)
      )
    ),

    React.createElement('div',{style:{maxWidth:560,margin:'0 auto'}},

      playing&&React.createElement(GamePlayer,{game:playing,onBack:()=>setPlaying(null)}),

      !playing&&step===0&&React.createElement('div',null,
        React.createElement('p',{style:{color:'#aaa',marginBottom:20,fontSize:15}},'Select your age group to get started:'),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          ...AGE_GROUPS.map(ag=>React.createElement('button',{
            key:ag.id, onClick:()=>setAge(ag.id),
            style:{padding:'20px 16px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:16,cursor:'pointer',textAlign:'left',transition:'all 0.2s'},
            onMouseEnter:e=>e.currentTarget.style.borderColor='#6C63FF',
            onMouseLeave:e=>e.currentTarget.style.borderColor='#2a2f4a',
          },
            React.createElement('div',{style:{fontSize:32,marginBottom:6}},ag.icon),
            React.createElement('div',{style:{fontWeight:700,color:'#fff',fontSize:16}},ag.label),
            React.createElement('div',{style:{color:'#666',fontSize:12}},`Ages ${ag.range}`)
          ))
        )
      ),

      !playing&&step===1&&React.createElement('div',null,
        React.createElement('p',{style:{color:'#aaa',marginBottom:20,fontSize:15}},'Choose a brain domain to train:'),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          ...DOMAINS.map(d=>React.createElement('button',{
            key:d.id, onClick:()=>{setDomain(d.id);setLevel('easy');},
            style:{padding:'16px 18px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:14,cursor:'pointer',display:'flex',alignItems:'center',gap:14,transition:'all 0.2s'},
            onMouseEnter:e=>{ e.currentTarget.style.borderColor=d.color; e.currentTarget.style.background=d.color+'11'; },
            onMouseLeave:e=>{ e.currentTarget.style.borderColor='#2a2f4a'; e.currentTarget.style.background='#1e2235'; },
          },
            React.createElement('span',{style:{fontSize:28}},d.icon),
            React.createElement('div',{style:{textAlign:'left'}},
              React.createElement('div',{style:{fontWeight:700,color:'#fff',fontSize:16}},d.label),
              React.createElement('div',{style:{color:'#666',fontSize:12}},d.desc)
            )
          ))
        )
      ),

      !playing&&step===2&&React.createElement('div',null,
        React.createElement('p',{style:{color:'#aaa',marginBottom:20,fontSize:15}},'Select your difficulty level:'),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:12}},
          ...LEVELS.map(l=>{
            const g = GAMES[domain]&&GAMES[domain][age]&&GAMES[domain][age][l.id];
            return React.createElement('button',{
              key:l.id, onClick:()=>setLevel(l.id),
              style:{padding:'18px 20px',background:'#1e2235',border:`2px solid ${l.color}33`,borderRadius:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',transition:'all 0.2s'},
              onMouseEnter:e=>e.currentTarget.style.borderColor=l.color,
              onMouseLeave:e=>e.currentTarget.style.borderColor=l.color+'33',
            },
              React.createElement('div',{style:{textAlign:'left'}},
                React.createElement('div',{style:{fontWeight:700,color:l.color,fontSize:16}},l.label),
                g&&React.createElement('div',{style:{color:'#666',fontSize:12,marginTop:2}},`${g.name} — ${g.desc}`)
              ),
              React.createElement('span',{style:{color:l.color,fontSize:20}},'→')
            );
          })
        )
      ),

      !playing&&step===3&&React.createElement('div',null,
        // Header
        React.createElement('div',{style:{marginBottom:20}},
          React.createElement('p',{style:{color:'#aaa',fontSize:15,marginBottom:4}},'Choose your game:'),
          React.createElement('p',{style:{color:'#555',fontSize:12}},`${(DOMAINS.find(d=>d.id===domain)||{}).icon} ${(DOMAINS.find(d=>d.id===domain)||{}).label} · ${(LEVELS.find(l=>l.id===level)||{}).label}`)
        ),
        // All levels as game cards — include domain2 extras
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:12}},
          ...[...LEVELS.map(l=>{
            const g = GAMES[domain]&&GAMES[domain][age]&&GAMES[domain][age][l.id];
            if(!g) return null;
            const lv = LEVELS.find(lx=>lx.id===l.id);
            return {key:l.id,g,lv,label:lv.label};
          }),
          ...LEVELS.map(l=>{
            const d2 = domain+'2';
            const g = GAMES[d2]&&GAMES[d2][age]&&GAMES[d2][age][l.id];
            if(!g) return null;
            const lv = LEVELS.find(lx=>lx.id===l.id);
            return {key:d2+l.id,g,lv,label:lv.label+' ★'};
          })].filter(Boolean).map(({key,g,lv,label})=>
            React.createElement('div',{key,
              style:{padding:'16px 18px',background:'#13172a',border:`2px solid #1e2235`,borderRadius:16,transition:'all 0.2s'}},
              React.createElement('div',{style:{display:'flex',alignItems:'center',marginBottom:10}},
                React.createElement('span',{style:{fontSize:11,fontWeight:700,color:lv.color,background:lv.color+'22',padding:'2px 8px',borderRadius:20,marginRight:8}},label.toUpperCase()),
                React.createElement('span',{style:{fontWeight:700,color:'#fff',fontSize:15}},g.name)
              ),
              React.createElement('p',{style:{color:'#666',fontSize:12,marginBottom:12}},g.desc),
              React.createElement('button',{onClick:()=>{setLevel(key);setPlaying(g);},
                style:{width:'100%',padding:'10px',background:`linear-gradient(135deg,${lv.color},${lv.color}aa)`,
                  border:'none',borderRadius:10,color:'#0a0e1a',fontWeight:700,cursor:'pointer',fontSize:14}},
                '▶ Play This Game')
            )
          )
        ),
        React.createElement('button',{onClick:()=>setLevel(null),style:{marginTop:14,background:'none',border:'1px solid #2a2f4a',borderRadius:10,color:'#555',cursor:'pointer',fontSize:12,padding:'8px 16px',width:'100%'}},'← Back to Domain')
      )
    ),

    step===0&&React.createElement('div',{style:{maxWidth:560,margin:'40px auto 0',display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}},
      ...DOMAINS.map(d=>React.createElement('div',{key:d.id,style:{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',background:'#1e2235',borderRadius:20}},
        React.createElement('span',null,d.icon),
        React.createElement('span',{style:{fontSize:11,color:'#555'}},d.label)
      ))
    ),

    React.createElement('div',{style:{textAlign:'center',marginTop:40,paddingBottom:20,color:'#333',fontSize:11}},
      'Cognicare by mhitr · Your self-care companion'
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
