// ══════════════════════════════════════════════════════════════════
// PROGRESSION ENGINE — shared hook for all 27 game components
// Each game defines a ROUNDS array (8 entries). The hook manages:
//   - current round index
//   - cumulative score
//   - per-round result tracking
//   - animated round transition banner
//   - final summary screen
// ══════════════════════════════════════════════════════════════════

function useProgression(rounds, onComplete) {
  const [roundIdx,   setRoundIdx]   = useState(0);
  const [score,      setScore]      = useState(0);
  const [results,    setResults]    = useState([]);   // [{correct,total,label}]
  const [phase,      setPhase]      = useState('play'); // play|transition|done
  const [transMsg,   setTransMsg]   = useState('');

  const currentRound = rounds[roundIdx] || rounds[rounds.length-1];

  const completeRound = (correct, total) => {
    const newResults = [...results, { correct, total, label: currentRound.label }];
    setResults(newResults);
    setScore(s => s + correct);

    if (roundIdx + 1 >= rounds.length) {
      const totalCorrect = newResults.reduce((a,r)=>a+r.correct,0);
      const totalQs      = newResults.reduce((a,r)=>a+r.total,0);
      setPhase('done');
      onComplete && onComplete({ score: totalCorrect, total: totalQs, rounds: newResults });
    } else {
      const next = rounds[roundIdx + 1];
      setTransMsg(`Round ${roundIdx+2} of ${rounds.length} — ${next.label}`);
      setPhase('transition');
      setTimeout(() => {
        setRoundIdx(i => i+1);
        setPhase('play');
      }, 1800);
    }
  };

  const renderTransition = () => React.createElement('div', {
    style: {
      textAlign:'center', padding:'40px 24px',
      background:'linear-gradient(135deg,#1e2235,#151928)',
      borderRadius:18, border:'2px solid #6C63FF44'
    }
  },
    React.createElement('div',{style:{fontSize:42,marginBottom:12}},'⚡'),
    React.createElement('div',{style:{color:'#6C63FF',fontWeight:800,fontSize:18,marginBottom:8}},
      `Round ${roundIdx+1} Complete!`),
    React.createElement('div',{style:{color:'#fff',fontSize:15,fontWeight:600}}, transMsg),
    React.createElement('div',{style:{
      marginTop:16, height:4, background:'#1e2235', borderRadius:4, overflow:'hidden'
    }},
      React.createElement('div',{style:{
        height:'100%',
        width:`${((roundIdx+1)/rounds.length)*100}%`,
        background:'linear-gradient(90deg,#6C63FF,#4ECDC4)',
        transition:'width 0.5s'
      }})
    ),
    React.createElement('div',{style:{color:'#555',fontSize:12,marginTop:8}},
      `${roundIdx+1} of ${rounds.length} rounds`)
  );

  const renderDone = (emoji='🎯', title='Complete!') => {
    const totalCorrect = results.reduce((a,r)=>a+r.correct,0);
    const totalQs      = results.reduce((a,r)=>a+r.total,0);
    const pct          = totalQs > 0 ? Math.round((totalCorrect/totalQs)*100) : 0;
    const grade        = pct>=90?'🏆 Excellent!':pct>=70?'⭐ Great!':pct>=50?'👍 Good!':'💪 Keep Practising!';
    return React.createElement('div',{style:{padding:24,background:'linear-gradient(135deg,#1e2235,#151928)',borderRadius:18,border:'2px solid #6C63FF44'}},
      React.createElement('div',{style:{textAlign:'center',marginBottom:20}},
        React.createElement('div',{style:{fontSize:48}},emoji),
        React.createElement('div',{style:{fontSize:22,fontWeight:700,color:'#fff',marginTop:8}},title),
        React.createElement('div',{style:{fontSize:28,fontWeight:800,color:'#6C63FF',marginTop:4}},grade),
        React.createElement('div',{style:{color:'#aaa',marginTop:4,fontSize:13}},
          `${totalCorrect}/${totalQs} correct  ·  ${pct}%`)
      ),
      // Round breakdown
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6}},
        ...results.map((r,i)=>{
          const rPct = r.total>0?Math.round((r.correct/r.total)*100):0;
          return React.createElement('div',{key:i,style:{display:'flex',alignItems:'center',gap:8}},
            React.createElement('div',{style:{width:70,fontSize:11,color:'#666',textAlign:'right',flexShrink:0}},r.label),
            React.createElement('div',{style:{flex:1,height:8,background:'#1a1d2e',borderRadius:4,overflow:'hidden'}},
              React.createElement('div',{style:{height:'100%',width:`${rPct}%`,
                background:rPct>=80?'#4ECDC4':rPct>=50?'#FFB347':'#FF6B6B',
                borderRadius:4,transition:'width 0.8s'}})
            ),
            React.createElement('div',{style:{width:32,fontSize:11,color:'#aaa',textAlign:'right',flexShrink:0}},`${r.correct}/${r.total}`)
          );
        })
      )
    );
  };

  return { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone };
}

// Round header bar shown inside each game
function RoundHeader({ roundIdx, totalRounds, label, score, color='#6C63FF' }) {
  return React.createElement('div',{style:{marginBottom:14}},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('span',{style:{
          background:color+'22',border:`1px solid ${color}44`,
          color,fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:20,letterSpacing:1
        }},`ROUND ${roundIdx+1}`),
        React.createElement('span',{style:{color:'#666',fontSize:12}},label)

      React.createElement('span',{style:{color:'#555',fontSize:12}},`Score: ${score}`)
    ),
    React.createElement('div',{style:{height:3,background:'#1a1d2e',borderRadius:4}},
      React.createElement('div',{style:{
        height:'100%',
        width:`${((roundIdx)/totalRounds)*100}%`,

// ── 1. COLOUR MATCH ───────────────────────────────────────────
function ColorMatch({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { pairs:3, timed:false, flipBack:1400, label:'3 pairs'      },
    { pairs:4, timed:false, flipBack:1300, label:'4 pairs'      },
    { pairs:4, timed:false, flipBack:1100, label:'4 pairs faster'},
    { pairs:5, timed:false, flipBack:1000, label:'5 pairs'      },
    { pairs:5, timed:false, flipBack:900,  label:'5 pairs faster'},
    { pairs:6, timed:false, flipBack:800,  label:'6 pairs'      },
    { pairs:7, timed:false, flipBack:700,  label:'7 pairs'      },
    { pairs:8, timed:true,  flipBack:600,  label:'8 pairs timed' },
  ];
  // Colored tile pairs — solid colors, no emojis (clinically cleaner)
  const TILE_COLORS = [
    {bg:'#FF6B6B',label:'Red'},    {bg:'#6C63FF',label:'Purple'},
    {bg:'#4ECDC4',label:'Teal'},   {bg:'#FFB347',label:'Orange'},
    {bg:'#A8E6CF',label:'Green'},  {bg:'#FF8ED4',label:'Pink'},
    {bg:'#87CEEB',label:'Blue'},   {bg:'#F7DC6F',label:'Yellow'},
    {bg:'#E59866',label:'Brown'},  {bg:'#85C1E9',label:'Sky'},
    {bg:'#82E0AA',label:'Lime'},   {bg:'#F1948A',label:'Salmon'},
    {bg:'#AED6F1',label:'Periwinkle'},{bg:'#FDEBD0',label:'Cream'},
    {bg:'#D7BDE2',label:'Lavender'},{bg:'#A9DFBF',label:'Mint'},
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeGrid = (pairs) => {
    const pool = TILE_COLORS.slice(0,pairs);
    return [...pool,...pool].sort(()=>Math.random()-0.5).map((t,i)=>({id:i,bg:t.bg,label:t.label,flipped:false,matched:false}));
  };

  const [cards,    setCards]    = useState(()=>makeGrid(currentRound.pairs));
  const [revealed, setRevealed] = useState([]);
  const [roundScore,setRoundScore]=useState(0);
  const [locked,   setLocked]   = useState(false);
  const [timeLeft, setTimeLeft] = useState(30);
  const pairs = currentRound.pairs;

  useEffect(()=>{
    setCards(makeGrid(currentRound.pairs));
    setRevealed([]); setRoundScore(0); setLocked(false);
    if(currentRound.timed) setTimeLeft(30);
  },[roundIdx]);

  useEffect(()=>{
    if(!currentRound.timed||phase!=='play') return;
    if(timeLeft<=0){ completeRound(roundScore, pairs); return; }
    const t=setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[timeLeft,currentRound.timed,phase]);

  const flip = (id) => {
    if(locked||phase!=='play') return;
    const card = cards.find(c=>c.id===id);
    if(!card||card.flipped||card.matched) return;
    const newCards = cards.map(c=>c.id===id?{...c,flipped:true}:c);
    const newRevealed = [...revealed, id];
    setCards(newCards); setRevealed(newRevealed);
    if(newRevealed.length===2){
      setLocked(true);
      const [a,b] = newRevealed.map(rid=>newCards.find(c=>c.id===rid));
      setTimeout(()=>{
        if(a.emoji===b.emoji){
          const matched = newCards.map(c=>newRevealed.includes(c.id)?{...c,matched:true}:c);
          const ns = roundScore+1;
          setCards(matched); setRoundScore(ns); setRevealed([]); setLocked(false);
          if(ns===pairs) completeRound(pairs,pairs);
        } else {
          setCards(newCards.map(c=>newRevealed.includes(c.id)?{...c,flipped:false}:c));
          setRevealed([]); setLocked(false);
        }
      }, currentRound.flipBack);
    }
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🃏','Memory Complete!');

  const cols = pairs<=4?4:pairs<=6?4:4;
  return React.createElement('div',null,
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#6C63FF'}),
    currentRound.timed&&React.createElement('div',{style:{textAlign:'right',color:timeLeft<10?'#FF6B6B':'#FFB347',fontSize:13,fontWeight:700,marginBottom:6}},`⏱ ${timeLeft}s`),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:8,maxWidth:340,margin:'0 auto'}},
      ...cards.map(c=>React.createElement('div',{key:c.id,onClick:()=>flip(c.id),
        style:{aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
          borderRadius:12,cursor:c.matched?'default':'pointer',
          background: c.matched ? c.bg+'66' : c.flipped ? c.bg : '#1e2235',
          border:`3px solid ${c.matched?c.bg:c.flipped?c.bg:'#2a2f4a'}`,
          transition:'all 0.2s',
          boxShadow: c.flipped&&!c.matched ? `0 0 12px ${c.bg}88` : 'none'
        }}))
    ),
    React.createElement('div',{style:{textAlign:'center',color:'#555',fontSize:12,marginTop:8}},`${roundScore}/${pairs} pairs found`)
  );
}

// ── 2. WHATS GONE ─────────────────────────────────────────────
function WhatsGone({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { items:3, studyTime:4, missing:1, label:'3 items, 4s study'  },
    { items:4, studyTime:4, missing:1, label:'4 items, 4s study'  },
    { items:4, studyTime:3, missing:1, label:'4 items, 3s study'  },
    { items:5, studyTime:4, missing:1, label:'5 items, 4s study'  },
    { items:5, studyTime:3, missing:1, label:'5 items, 3s study'  },
    { items:6, studyTime:4, missing:2, label:'6 items, 2 missing' },
    { items:7, studyTime:4, missing:2, label:'7 items, 2 missing' },
    { items:8, studyTime:3, missing:2, label:'8 items, 2 missing' },
  ];
  const POOL=['🍎','🍌','🍇','🍓','🍉','🍒','🍑','🥝','🍋','🍊','🥕','🥦','🌽','🍄','🍞','🧀','🥚','🍕','🎈','🎸','🎯','⚽','🏀','🎨'];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeSet = (n) => [...POOL].sort(()=>Math.random()-0.5).slice(0,n);
  const [shown,   setShown]   = useState(()=>makeSet(currentRound.items));
  const [phase2,  setPhase2]  = useState('study');
  const [removed, setRemoved] = useState([]);
  const [choices, setChoices] = useState([]);
  const [picked,  setPicked]  = useState([]);
  const [countdown,setCdown]  = useState(currentRound.studyTime);

  useEffect(()=>{
    const s = makeSet(currentRound.items);
    setShown(s); setPhase2('study'); setPicked([]);
    setCdown(currentRound.studyTime);
  },[roundIdx]);

  useEffect(()=>{
    if(phase2!=='study') return;
    if(countdown<=0){
      const rem = [...shown].sort(()=>Math.random()-0.5).slice(0,currentRound.missing);
      const distractors = POOL.filter(x=>!shown.includes(x)).sort(()=>Math.random()-0.5).slice(0,4);
      setRemoved(rem);
      setChoices([...rem,...distractors].sort(()=>Math.random()-0.5));
      setPhase2('recall');
      return;
    }
    const t=setTimeout(()=>setCdown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[countdown,phase2]);

  const pick = (item) => {
    if(phase2!=='recall') return;
    const np=[...picked,item];
    setPicked(np);
    if(np.length>=currentRound.missing){
      const correct=np.filter(x=>removed.includes(x)).length;
      setTimeout(()=>completeRound(correct,currentRound.missing),900);
    }
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🔍','Recall Complete!');

  return React.createElement('div',null,
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#FF6B6B'}),
    phase2==='study'&&React.createElement('div',null,
      React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:13,marginBottom:10,textAlign:'center'}},`Remember these! (${countdown}s)`),
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',marginBottom:8}},
        ...shown.map((e,i)=>React.createElement('div',{key:i,style:{fontSize:config.large?34:28,padding:'10px',background:'#1e2235',borderRadius:12,border:'2px solid #2a2f4a'}},e))
      )
    ),
    phase2==='recall'&&React.createElement('div',null,
      React.createElement('div',{style:{color:'#4ECDC4',fontWeight:600,fontSize:13,marginBottom:12,textAlign:'center'}},
        `What's missing? Pick ${currentRound.missing}`),
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:12}},
        ...shown.filter(x=>!removed.includes(x)).map((e,i)=>React.createElement('div',{key:i,style:{fontSize:config.large?30:24,padding:'8px',background:'#1e2235',borderRadius:10,border:'1px solid #2a2f4a'}},e))
      ),
      React.createElement('div',{style:{borderTop:'1px solid #1e2235',paddingTop:12}},
        React.createElement('div',{style:{color:'#555',fontSize:12,marginBottom:8,textAlign:'center'}},'Choose from:'),
        React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}},
          ...choices.map((c,i)=>{
            const isPicked=picked.includes(c);
            const isCorrect=isPicked&&removed.includes(c);
            return React.createElement('button',{key:i,onClick:()=>pick(c),disabled:isPicked,
              style:{fontSize:config.large?28:22,padding:'10px 14px',borderRadius:12,border:`2px solid ${isPicked?(isCorrect?'#4ECDC4':'#FF6B6B'):'#2a2f4a'}`,
                background:isPicked?(isCorrect?'#4ECDC422':'#FF6B6B22'):'#1e2235',cursor:isPicked?'default':'pointer'}},c);
          })
        )
      )
    )
  );
}

// ── 3. MENTAL MATH ────────────────────────────────────────────
function MentalMath({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { ops:['+'],      maxNum:5,  timePerQ:8,  qs:3, label:'Add to 5, 3 Qs'        },
    { ops:['+'],      maxNum:10, timePerQ:7,  qs:3, label:'Add to 10, 3 Qs'       },
    { ops:['+','-'],  maxNum:10, timePerQ:7,  qs:3, label:'Add & subtract to 10'  },
    { ops:['+','-'],  maxNum:20, timePerQ:6,  qs:4, label:'Add & subtract to 20'  },
    { ops:['+','-'],  maxNum:20, timePerQ:5,  qs:4, label:'Faster — to 20'        },
    { ops:['+','-','×'], maxNum:10, timePerQ:6, qs:4, label:'Include multiply'    },
    { ops:['+','-','×'], maxNum:12, timePerQ:5, qs:5, label:'Multiply to 12'      },
    { ops:['+','-','×'], maxNum:15, timePerQ:4, qs:5, label:'Speed round to 15'   },
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeQ = (r) => {
    const op = r.ops[Math.floor(Math.random()*r.ops.length)];
    let a=Math.floor(Math.random()*r.maxNum)+1, b=Math.floor(Math.random()*r.maxNum)+1;
    if(op==='-'&&b>a)[a,b]=[b,a];
    if(op==='×'){a=Math.floor(Math.random()*Math.min(r.maxNum,12))+1;b=Math.floor(Math.random()*Math.min(r.maxNum,12))+1;}
    const ans=op==='+'?a+b:op==='-'?a-b:a*b;
    return {q:`${a} ${op} ${b} = ?`, ans};
  };

  const [qs]       = useState(()=>Array.from({length:currentRound.qs},()=>makeQ(currentRound)));
  const [qSet,     setQSet]     = useState(()=>Array.from({length:currentRound.qs},()=>makeQ(currentRound)));
  const [qi,       setQi]       = useState(0);
  const [input,    setInput]    = useState('');
  const [feedback, setFeedback] = useState(null);
  const [correct,  setCorrect]  = useState(0);
  const [timeLeft, setTimeLeft] = useState(currentRound.timePerQ);

  useEffect(()=>{
    setQSet(Array.from({length:currentRound.qs},()=>makeQ(currentRound)));
    setQi(0); setInput(''); setFeedback(null); setCorrect(0);
    setTimeLeft(currentRound.timePerQ);
  },[roundIdx]);

  useEffect(()=>{
    if(feedback!==null) return;
    if(timeLeft<=0){handleAnswer(true); return;}
    const t=setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[timeLeft,feedback]);

  const handleAnswer=(timeout=false)=>{
    const q=qSet[qi];
    const isCorrect=!timeout&&parseInt(input)===q.ans;
    setFeedback(isCorrect?'correct':'wrong');
    const nc=correct+(isCorrect?1:0);
    setTimeout(()=>{
      if(qi+1>=currentRound.qs){ completeRound(nc,currentRound.qs); }
      else{ setQi(i=>i+1); setInput(''); setFeedback(null); setTimeLeft(currentRound.timePerQ); setCorrect(nc); }
    },800);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🧮','Maths Complete!');

  const q=qSet[qi];
  const timerColor=timeLeft<=2?'#FF6B6B':timeLeft<=4?'#FFB347':'#4ECDC4';

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#A8E6CF'}),
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:16,padding:'0 4px'}},
      React.createElement('span',{style:{color:'#555',fontSize:13}},`Q${qi+1}/${currentRound.qs}`),
      React.createElement('span',{style:{color:timerColor,fontWeight:700,fontSize:15}},`${timeLeft}s`)
    ),
    React.createElement('div',{style:{fontSize:config.large?36:30,fontWeight:800,color:'#fff',marginBottom:20,padding:'20px',
      background:feedback==='correct'?'#4ECDC422':feedback==='wrong'?'#FF6B6B22':'#1e2235',
      border:`2px solid ${feedback==='correct'?'#4ECDC4':feedback==='wrong'?'#FF6B6B':'#2a2f4a'}`,
      borderRadius:16,transition:'all 0.2s'}},q.q),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:240,margin:'0 auto'}},
      React.createElement('input',{value:input,onChange:e=>setInput(e.target.value.replace(/[^0-9-]/g,'')),
        onKeyDown:e=>e.key==='Enter'&&feedback===null&&handleAnswer(),
        disabled:feedback!==null,autoFocus:true,
        style:{flex:1,padding:'12px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,
          color:'#fff',fontSize:config.large?24:20,textAlign:'center',fontFamily:'monospace',outline:'none'}}),
      React.createElement('button',{onClick:()=>feedback===null&&handleAnswer(),disabled:feedback!==null||!input,
        style:{padding:'12px 16px',background:'#4ECDC4',border:'none',borderRadius:10,color:'#0a0e1a',fontWeight:700,cursor:'pointer'}},'✓')
    ),
    feedback&&React.createElement('div',{style:{marginTop:10,color:feedback==='correct'?'#4ECDC4':'#FF6B6B',fontWeight:700,fontSize:14}},
      feedback==='correct'?'✓ Correct!':'✗ Answer: '+q.ans)
  );
}

// ── 4. CLOCK READING ──────────────────────────────────────────
function ClockReading({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { mOpts:[0],               qs:2, label:'Hour only'             },
    { mOpts:[0,30],            qs:2, label:'Hour & half-hour'      },
    { mOpts:[0,15,30,45],      qs:3, label:'Quarter hours'         },
    { mOpts:[0,15,30,45],      qs:3, label:'Quarter hours, faster' },
    { mOpts:[0,5,10,15,20,25,30,35,40,45,50,55], qs:3, label:'5-min intervals' },
    { mOpts:[0,5,10,15,20,25,30,35,40,45,50,55], qs:3, label:'5-min intervals, more Qs' },
    { mOpts:'any',             qs:3, label:'Any minute'            },
    { mOpts:'any',             qs:3, label:'Any minute, speed'     },
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeTime = (r) => {
    const h=Math.floor(Math.random()*12)+1;
    const mOpts = r.mOpts==='any'
      ? Array.from({length:60},(_,i)=>i)
      : r.mOpts;
    const m=mOpts[Math.floor(Math.random()*mOpts.length)];
    return {h,m};
  };
  const fmtTime = ({h,m}) => `${h}:${String(m).padStart(2,'0')}`;
  const makeOpts = (correct, r) => {
    const set=new Set([fmtTime(correct)]);
    while(set.size<4){
      const t=makeTime({mOpts:r.mOpts==='any'?Array.from({length:12},(_,i)=>(i+1)*5):r.mOpts});
      set.add(fmtTime(t));
    }
    return [...set].sort(()=>Math.random()-0.5);
  };

  const [times,  setTimes]  = useState(()=>Array.from({length:currentRound.qs},()=>makeTime(currentRound)));
  const [opts,   setOpts]   = useState(()=>{const ts=Array.from({length:currentRound.qs},()=>makeTime(currentRound));return ts.map(t=>makeOpts(t,currentRound));});
  const [qi,     setQi]     = useState(0);
  const [picked, setPicked] = useState(null);
  const [correct,setCorrect]=useState(0);

  useEffect(()=>{
    const ts=Array.from({length:currentRound.qs},()=>makeTime(currentRound));
    setTimes(ts); setOpts(ts.map(t=>makeOpts(t,currentRound)));
    setQi(0); setPicked(null); setCorrect(0);
  },[roundIdx]);

  const choose=(opt)=>{
    if(picked) return; setPicked(opt);
    const isCorrect=opt===fmtTime(times[qi]);
    const nc=correct+(isCorrect?1:0);
    setTimeout(()=>{
      if(qi+1>=currentRound.qs){ completeRound(nc,currentRound.qs); }
      else{ setQi(i=>i+1); setPicked(null); setCorrect(nc); }
    },1000);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🕐','Clock Reading Complete!');

  const t=times[qi]; const r=15; const cx=60; const cy=60;
  const hAngle=(((t.h%12)+t.m/60)/12)*360-90;
  const mAngle=(t.m/60)*360-90;
  const toXY=(angle,len)=>({x:cx+len*Math.cos(angle*Math.PI/180),y:cy+len*Math.sin(angle*Math.PI/180)});
  const hp=toXY(hAngle,32); const mp=toXY(mAngle,45);

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#FFB347'}),
    React.createElement('div',{style:{color:'#aaa',fontSize:12,marginBottom:14}},`Q${qi+1} of ${currentRound.qs}`),
    React.createElement('svg',{width:120,height:120,style:{margin:'0 auto 20px',display:'block'}},
      React.createElement('circle',{cx,cy,r:55,fill:'#1e2235',stroke:'#6C63FF',strokeWidth:3}),
      ...[12,3,6,9].map((n,i)=>{
        const a=(i*90-90)*Math.PI/180;
        return React.createElement('text',{key:n,x:cx+42*Math.cos(a),y:cy+42*Math.sin(a)+4,textAnchor:'middle',fontSize:12,fill:'#aaa',fontFamily:'Arial'},n);
      }),
      ...[...Array(60)].map((_,i)=>{
        const a=(i*6-90)*Math.PI/180;
        const isHour=i%5===0;
        return React.createElement('line',{key:i,
          x1:cx+(isHour?46:50)*Math.cos(a),y1:cy+(isHour?46:50)*Math.sin(a),
          x2:cx+53*Math.cos(a),y2:cy+53*Math.sin(a),
          stroke:isHour?'#666':'#2a2f4a',strokeWidth:isHour?2:1});
      }),
      React.createElement('line',{x1:cx,y1:cy,x2:hp.x,y2:hp.y,stroke:'#fff',strokeWidth:4,strokeLinecap:'round'}),
      React.createElement('line',{x1:cx,y1:cy,x2:mp.x,y2:mp.y,stroke:'#4ECDC4',strokeWidth:3,strokeLinecap:'round'}),
      React.createElement('circle',{cx,cy,r:4,fill:'#6C63FF'})
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:280,margin:'0 auto'}},
      ...opts[qi].map((opt,i)=>{
        let bg='#1e2235',border='#2a2f4a',color='#e0e0ff';
        if(picked){if(opt===fmtTime(times[qi])){bg='#4ECDC422';border='#4ECDC4';}else if(opt===picked){bg='#FF6B6B22';border='#FF6B6B';}}
        return React.createElement('button',{key:i,onClick:()=>choose(opt),
          style:{padding:'12px',background:bg,border:`2px solid ${border}`,borderRadius:12,color,
            fontSize:config.large?18:16,fontWeight:700,cursor:picked?'default':'pointer',fontFamily:'monospace'}},opt);
      })
    )
  );
}

// ── 5. SIMON SAYS ─────────────────────────────────────────────
function SimonSays({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { seqLen:2, speed:1100, colors:4, label:'2 colours'          },
    { seqLen:3, speed:1000, colors:4, label:'3 colours'          },
    { seqLen:3, speed:900,  colors:4, label:'3 colours, faster'  },
    { seqLen:4, speed:900,  colors:4, label:'4 colours'          },
    { seqLen:4, speed:800,  colors:4, label:'4 colours, faster'  },
    { seqLen:5, speed:750,  colors:5, label:'5 colours in seq'   },
    { seqLen:6, speed:700,  colors:5, label:'6 colours'          },
    { seqLen:7, speed:600,  colors:5, label:'Speed round'        },
  ];
  const COLORS=[{id:'red',c:'#FF6B6B'},{id:'blue',c:'#6C63FF'},{id:'green',c:'#4ECDC4'},{id:'yellow',c:'#FFB347'},{id:'purple',c:'#9B59B6'}];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeSeq = (r) => Array.from({length:r.seqLen},()=>Math.floor(Math.random()*r.colors));
  const [seq,      setSeq]      = useState(()=>makeSeq(currentRound));
  const [showing,  setShowing]  = useState(-1);
  const [inputPhase,setIP]      = useState(false);
  const [userSeq,  setUserSeq]  = useState([]);
  const [lit,      setLit]      = useState(null);
  const [failed,   setFailed]   = useState(false);

  const timersRef = useRef([]);
  const clearTimers = () => { timersRef.current.forEach(clearTimeout); timersRef.current=[]; };

  const runSeq = (s, sp) => {
    clearTimers();
    let i=0;
    const next=()=>{
      if(i>=s.length){setShowing(-1);setIP(true);return;}
      setLit(s[i]);
      timersRef.current.push(setTimeout(()=>{
        setLit(null);
        timersRef.current.push(setTimeout(()=>{i++;next();},sp*0.3));
      },sp*0.7));
    };
    timersRef.current.push(setTimeout(next,600));
  };

  useEffect(()=>{
    const s=makeSeq(currentRound);
    setSeq(s); setIP(false); setUserSeq([]); setFailed(false); setLit(null);
    runSeq(s,currentRound.speed);
    return ()=>clearTimers();
  },[roundIdx]);

  const tap=(colorIdx)=>{
    if(!inputPhase||failed) return;
    const ns=[...userSeq,colorIdx];
    setLit(colorIdx); setTimeout(()=>setLit(null),200);
    const pos=ns.length-1;
    if(ns[pos]!==seq[pos]){setFailed(true);setTimeout(()=>completeRound(0,1),1000);return;}
    if(ns.length===seq.length){setUserSeq(ns);setTimeout(()=>completeRound(1,1),500);}
    else setUserSeq(ns);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🌈','Simon Complete!');

  const colors=COLORS.slice(0,currentRound.colors);
  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#FF6B6B'}),
    React.createElement('div',{style:{color:'#aaa',fontSize:12,marginBottom:16}},
      inputPhase?`Repeat ${seq.length} colours`:'Watch carefully...'),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:240,margin:'0 auto 16px'}},
      ...colors.map((cl,i)=>React.createElement('div',{key:i,onClick:()=>tap(i),
        style:{height:80,borderRadius:16,background:lit===i?cl.c:cl.c+'44',
          border:`3px solid ${lit===i?cl.c:'transparent'}`,cursor:inputPhase?'pointer':'default',
          transition:'all 0.15s',boxShadow:lit===i?`0 0 20px ${cl.c}`:'none'}}))
    ),
    failed&&React.createElement('div',{style:{color:'#FF6B6B',fontWeight:700,fontSize:14}},'✗ Wrong!'),
    inputPhase&&!failed&&React.createElement('div',{style:{color:'#555',fontSize:12}},`${userSeq.length}/${seq.length} entered`)
  );
}

// ── 6. SPATIAL RECALL ─────────────────────────────────────────
function SpatialRecall({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { grid:3, tiles:2, studyTime:2, label:'3×3 grid, 2 tiles'  },
    { grid:3, tiles:3, studyTime:2, label:'3×3 grid, 3 tiles'  },
    { grid:3, tiles:4, studyTime:2, label:'3×3 grid, 4 tiles'  },
    { grid:4, tiles:4, studyTime:3, label:'4×4 grid, 4 tiles'  },
    { grid:4, tiles:5, studyTime:3, label:'4×4 grid, 5 tiles'  },
    { grid:4, tiles:6, studyTime:3, label:'4×4 grid, 6 tiles'  },
    { grid:5, tiles:6, studyTime:3, label:'5×5 grid, 6 tiles'  },
    { grid:5, tiles:8, studyTime:3, label:'5×5 grid, 8 tiles'  },
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makePat=(r)=>{
    const cells=Array.from({length:r.grid*r.grid},(_,i)=>i);
    return cells.sort(()=>Math.random()-0.5).slice(0,r.tiles);
  };

  const [pattern,  setPat]     = useState(()=>makePat(currentRound));
  const [phase2,   setPhase2]  = useState('study');
  const [selected, setSelected]=useState([]);
  const [countdown,setCdown]   =useState(currentRound.studyTime);
  const total=currentRound.grid*currentRound.grid;

  useEffect(()=>{
    const p=makePat(currentRound);
    setPat(p); setPhase2('study'); setSelected([]);
    setCdown(currentRound.studyTime);
  },[roundIdx]);

  useEffect(()=>{
    if(phase2!=='study') return;
    if(countdown<=0){setPhase2('recall');return;}
    const t=setTimeout(()=>setCdown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[countdown,phase2]);

  const tap=(i)=>{
    if(phase2!=='recall') return;
    const ns=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
    setSelected(ns);
    if(ns.length===currentRound.tiles){
      const correct=ns.filter(x=>pattern.includes(x)).length;
      setTimeout(()=>completeRound(correct,currentRound.tiles),600);
    }
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🔲','Spatial Complete!');

  const cellSize=Math.min(52,Math.floor(240/currentRound.grid));
  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#4ECDC4'}),
    phase2==='study'&&React.createElement('div',{style:{color:'#FFB347',fontSize:13,fontWeight:600,marginBottom:12}},`Remember these positions (${countdown}s)`),
    phase2==='recall'&&React.createElement('div',{style:{color:'#4ECDC4',fontSize:13,fontWeight:600,marginBottom:12}},`Tap ${currentRound.tiles} positions`),
    React.createElement('div',{style:{display:'inline-grid',gridTemplateColumns:`repeat(${currentRound.grid},1fr)`,gap:4,background:'#2a2f4a',padding:4,borderRadius:12}},
      ...Array.from({length:total},(_,i)=>{
        const isPattern=pattern.includes(i);
        const isSel=selected.includes(i);
        let bg=phase2==='study'?(isPattern?'#6C63FF':'#1e2235'):(isSel?'#4ECDC4':'#1e2235');
        return React.createElement('div',{key:i,onClick:()=>tap(i),
          style:{width:cellSize,height:cellSize,borderRadius:6,background:bg,
            cursor:phase2==='recall'?'pointer':'default',transition:'background 0.2s',
            border:`2px solid ${isSel&&phase2==='recall'?'#4ECDC4':'transparent'}`}});
      })
    ),
    phase2==='recall'&&React.createElement('div',{style:{color:'#555',fontSize:12,marginTop:10}},
      `${selected.length}/${currentRound.tiles} selected`)
  );
}

// ── 7. NUMBER PATTERN ─────────────────────────────────────────
function NumberPattern({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { type:'add1',    label:'Sequence 1 — what comes next?' },
    { type:'add2',    label:'Sequence 2 — find the pattern'  },
    { type:'add_var', label:'Sequence 3 — spot the rule'     },
    { type:'mult',    label:'Sequence 4 — growing numbers'   },
    { type:'sub',     label:'Sequence 5 — shrinking numbers' },
    { type:'square',  label:'Sequence 6 — special pattern'   },
    { type:'fib',     label:'Sequence 7 — classic sequence'  },
    { type:'mixed',   label:'Sequence 8 — mixed challenge'   },
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeQ=(type)=>{
    let seq=[],rule='';
    const start=Math.floor(Math.random()*10)+1;
    if(type==='add1'){const s=start;seq=[s,s+1,s+2,s+3,s+4];rule='+1';}
    else if(type==='add2'){const s=start;seq=[s,s+2,s+4,s+6,s+8];rule='+2';}
    else if(type==='add_var'){const d=Math.floor(Math.random()*5)+3;const s=start;seq=[s,s+d,s+d*2,s+d*3,s+d*4];rule=`+${d}`;}
    else if(type==='mult'){const b=Math.floor(Math.random()*4)+2;seq=[b,b*2,b*3,b*4,b*5];rule=`×${b}`;}
    else if(type==='sub'){const s=start+20;const d=Math.floor(Math.random()*3)+2;seq=[s,s-d,s-d*2,s-d*3,s-d*4];rule=`-${d}`;}
    else if(type==='square'){const s=start;seq=[s*s,(s+1)*(s+1),(s+2)*(s+2),(s+3)*(s+3),(s+4)*(s+4)];rule='n²';}
    else if(type==='fib'){seq=[1,1,2,3,5,8];return{seq:seq.slice(0,5),answer:seq[5],rule:'each = sum of previous two'};}
    else{const ops=['+','-','×'];const op=ops[Math.floor(Math.random()*2)];const d=Math.floor(Math.random()*5)+2;const s=start;
      if(op==='+'){seq=[s,s+d,s+d*2,s+d*3,s+d*4];}else{const ss=s+d*4;seq=[ss,ss-d,ss-d*2,ss-d*3,ss-d*4];}rule=op+d;}
    return{seq:seq.slice(0,4),answer:seq[4],rule};
  };

  const [questions,setQuestions]=useState(()=>Array.from({length:3},()=>makeQ(currentRound.type)));
  const [qi,setQi]=useState(0);
  const [input,setInput]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [correct,setCorrect]=useState(0);

  useEffect(()=>{
    setQuestions(Array.from({length:3},()=>makeQ(currentRound.type)));
    setQi(0);setInput('');setFeedback(null);setCorrect(0);
  },[roundIdx]);

  const check=()=>{
    const q=questions[qi];
    const isOk=parseInt(input)===q.answer;
    setFeedback(isOk?'correct':'wrong');
    const nc=correct+(isOk?1:0);
    setTimeout(()=>{
      if(qi+1>=3){completeRound(nc,3);}
      else{setQi(i=>i+1);setInput('');setFeedback(null);setCorrect(nc);}
    },900);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🔢','Patterns Complete!');

  const q=questions[qi];
  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#A8E6CF'}),
    React.createElement('div',{style:{color:'#aaa',fontSize:12,marginBottom:16}},`Sequence ${qi+1}/3`),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',marginBottom:20,flexWrap:'wrap'}},
      ...q.seq.map((n,i)=>React.createElement('div',{key:i,style:{width:54,height:54,display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:config.large?20:18,fontWeight:700,background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:12,color:'#4ECDC4'}},n)),
      React.createElement('div',{style:{width:54,height:54,display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:18,fontWeight:700,background:feedback==='correct'?'#4ECDC422':feedback==='wrong'?'#FF6B6B22':'#FFB34722',
        border:`2px dashed ${feedback==='correct'?'#4ECDC4':feedback==='wrong'?'#FF6B6B':'#FFB347'}`,borderRadius:12,
        color:feedback==='correct'?'#4ECDC4':feedback==='wrong'?'#FF6B6B':'#FFB347'}},
        feedback?q.answer:'?')
    ),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:220,margin:'0 auto'}},
      React.createElement('input',{value:input,onChange:e=>setInput(e.target.value.replace(/[^0-9-]/g,'')),
        onKeyDown:e=>e.key==='Enter'&&feedback===null&&check(),disabled:feedback!==null,autoFocus:true,
        style:{flex:1,padding:'12px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,
          color:'#fff',fontSize:config.large?22:18,textAlign:'center',fontFamily:'monospace',outline:'none'}}),
      React.createElement('button',{onClick:()=>feedback===null&&check(),disabled:feedback!==null||!input,
        style:{padding:'12px 16px',background:'#A8E6CF',border:'none',borderRadius:10,color:'#0a0e1a',fontWeight:700,cursor:'pointer'}},'✓')
    )
  );
}

// ── 8. WORD SCRAMBLE ──────────────────────────────────────────
function WordScramble({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { len:3, bank:'easy',   timePerQ:15, label:'3-letter words'         },
    { len:3, bank:'easy',   timePerQ:14, label:'3-letter words, faster'  },
    { len:5, bank:'medium', timePerQ:13, label:'5-letter words'          },
    { len:5, bank:'medium', timePerQ:12, label:'5-letter words, timed'   },
    { len:5, bank:'medium', timePerQ:10, label:'5-letter, timed'        },
    { len:6, bank:'hard',   timePerQ:12, label:'6-letter words'         },
    { len:6, bank:'hard',   timePerQ:10, label:'6-letter, faster'       },
    { len:7, bank:'expert', timePerQ:12, label:'7-letter expert words'  },
  ];
  const BANKS = {
    easy:  ['CAT','DOG','SUN','BED','HAT','CUP','RUN','FLY','MAP','JAR','BUS','AXE','EGG','ICE','OWL','PIG'],
    medium:['BRAIN','CLOUD','FLAME','GRAPE','STONE','SMILE','PLANE','TRAIN','BREAD','CHAIR','SHARK','TIGER'],
    hard:  ['CASTLE','GARDEN','MONKEY','BRIDGE','BUTTER','FOREST','PYTHON','SILVER','DONKEY','FROZEN','PLANET'],
    expert:['JOURNEY','DOLPHIN','FREEDOM','MYSTERY','BLANKET','CAPTAIN','DIAMOND','MACHINE','PATTERN','QUALITY'],
  };
  const scramble=(w)=>{const a=[...w];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('')===w?scramble(w):a.join('');};
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const pick=()=>{
    const pool=BANKS[currentRound.bank]||BANKS.easy;
    const w=pool[Math.floor(Math.random()*pool.length)];
    return{word:w,scrambled:scramble(w)};
  };

  const [current,setCurrent]=useState(()=>pick());
  const [input,setInput]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [correct,setCorrect]=useState(0);
  const [qCount,setQCount]=useState(0);
  const TOTAL_QS=3;

  useEffect(()=>{setCurrent(pick());setInput('');setFeedback(null);setCorrect(0);setQCount(0);},[roundIdx]);

  const check=()=>{
    const isOk=input.trim().toUpperCase()===current.word;
    setFeedback(isOk?'correct':'wrong');
    const nc=correct+(isOk?1:0);
    setTimeout(()=>{
      const nq=qCount+1;
      if(nq>=TOTAL_QS){completeRound(nc,TOTAL_QS);}
      else{setCurrent(pick());setInput('');setFeedback(null);setCorrect(nc);setQCount(nq);}
    },900);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🔤','Word Scramble Complete!');

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#4ECDC4'}),
    React.createElement('div',{style:{color:'#aaa',fontSize:12,marginBottom:20}},`Word ${qCount+1}/${TOTAL_QS}`),
    React.createElement('div',{style:{fontSize:config.large?38:32,fontWeight:800,color:'#FFB347',letterSpacing:8,marginBottom:20,
      padding:'16px',background:'#1e2235',borderRadius:14,border:'2px solid #2a2f4a'}},
      current.scrambled.split('').join(' ')),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:280,margin:'0 auto'}},
      React.createElement('input',{value:input,onChange:e=>setInput(e.target.value.toUpperCase().replace(/[^A-Z]/g,'')),
        onKeyDown:e=>e.key==='Enter'&&feedback===null&&check(),disabled:feedback!==null,autoFocus:true,
        style:{flex:1,padding:'12px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,
          color:'#fff',fontSize:config.large?22:18,textAlign:'center',fontFamily:'monospace',letterSpacing:4,outline:'none'}}),
      React.createElement('button',{onClick:()=>feedback===null&&check(),disabled:feedback!==null||!input,
        style:{padding:'12px 16px',background:'#4ECDC4',border:'none',borderRadius:10,color:'#0a0e1a',fontWeight:700,cursor:'pointer'}},'✓')
    ),
    feedback&&React.createElement('div',{style:{marginTop:10,color:feedback==='correct'?'#4ECDC4':'#FF6B6B',fontWeight:700,fontSize:15,letterSpacing:3}},
      feedback==='correct'?`✓ ${current.word}`:`✗ ${current.word}`)
  );
}

// ── 9. WORD ASSOCIATION ───────────────────────────────────────
function WordAssociation({ config, onComplete }) {
  const ROUND_SPECS = config.roundSpecs || [
    { pool:'animals',   label:'Animals category'      },

function DigitSpan({ config, onComplete }) {
  const ROUND_SPECS=config.roundSpecs||[
    {len:2,speed:900, label:'2 digits'},
    {len:3,speed:850, label:'3 digits'},
    {len:3,speed:750, label:'3 digits, faster'},
    {len:4,speed:800, label:'4 digits'},
    {len:4,speed:700, label:'4 digits, faster'},
    {len:5,speed:750, label:'5 digits'},
    {len:6,speed:700, label:'6 digits'},
    {len:7,speed:650, label:'7 digits — expert'},
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const makeSeq=(n)=>Array.from({length:n},()=>Math.floor(Math.random()*10));
  const [digits,setDigits]=useState(()=>makeSeq(currentRound.len));
  const [showIdx,setShowIdx]=useState(0);
  const [showing,setShowing]=useState(true);
  const [input,setInput]=useState('');

  useEffect(()=>{
    const d=makeSeq(currentRound.len);
    setDigits(d);setShowIdx(0);setShowing(true);setInput('');
    const interval=setInterval(()=>{
      setShowIdx(i=>{
        if(i>=d.length-1){clearInterval(interval);setTimeout(()=>setShowing(false),400);return i;}
        return i+1;
      });
    },currentRound.speed);
    return()=>clearInterval(interval);
  },[roundIdx]);

  const submit=()=>{
    const isOk=input.trim()===digits.join('');
    completeRound(isOk?1:0,1);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🔢','Digit Span Complete!');

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#6C63FF'}),
    showing
      ? React.createElement('div',null,
          React.createElement('div',{style:{color:'#FFB347',fontWeight:600,fontSize:13,marginBottom:16}},'Remember this sequence!'),
          React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}},

              width:52,height:52,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',

              background:i===showIdx?'#6C63FF':'#1e2235',
              border:i===showIdx?'2px solid #9b95ff':'2px solid #2a2f4a',
              color:i===showIdx?'#fff':'#333',transition:'all 0.2s'}},i<=showIdx?d:''))
          )
        )
      : React.createElement('div',null,
          React.createElement('div',{style:{color:'#4ECDC4',fontWeight:600,fontSize:13,marginBottom:16}},'Type the digits you saw:'),
          React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'center',maxWidth:260,margin:'0 auto'}},
            React.createElement('input',{value:input,onChange:e=>setInput(e.target.value.replace(/\D/g,'')),
              onKeyDown:e=>e.key==='Enter'&&submit(),placeholder:'Enter digits...',maxLength:10,autoFocus:true,
              style:{flex:1,padding:'12px 14px',background:'#1e2235',border:'2px solid #2a2f4a',borderRadius:10,color:'#fff',
                fontSize:config.large?22:18,outline:'none',textAlign:'center',letterSpacing:4,fontFamily:'monospace'}}),
            React.createElement('button',{onClick:submit,style:{padding:'12px 16px',background:'#4ECDC4',border:'none',borderRadius:10,color:'#0a0e1a',cursor:'pointer',fontWeight:700}},'✓')

}

function NBack({ config, onComplete }) {
  const ROUND_SPECS=config.roundSpecs||[
    {n:1,trials:8, label:'1-Back, 8 trials'},
    {n:1,trials:10,label:'1-Back, 10 trials'},
    {n:1,trials:12,label:'1-Back, 12 trials'},
    {n:2,trials:10,label:'2-Back, 10 trials'},
    {n:2,trials:12,label:'2-Back, 12 trials'},
    {n:2,trials:15,label:'2-Back, 15 trials'},
    {n:3,trials:12,label:'3-Back, 12 trials'},
    {n:3,trials:15,label:'3-Back — expert'},
  ];
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const LETTERS='ABCDEFGH'.split('');
  const makeSeq=(trials)=>Array.from({length:trials},()=>LETTERS[Math.floor(Math.random()*6)]);
  const [seq]=useState(()=>makeSeq(currentRound.trials));
  const [seqSet,setSeqSet]=useState(()=>makeSeq(currentRound.trials));
  const [trial,setTrial]=useState(0);
  const [showing,setShowing2]=useState(false);
  const [current,setCurrent]=useState(null);
  const [hits,setHits]=useState(0);
  const [misses,setMisses]=useState(0);
  const [responded,setResponded]=useState(false);
  const [done2,setDone2]=useState(false);
  const seqRef=useRef([]);

  const nbackTimersRef = useRef([]);
  const clearNbackTimers = () => { nbackTimersRef.current.forEach(clearTimeout); nbackTimersRef.current=[]; };

  const runTrial=(s,t,n)=>{
    if(t>=s.length){setDone2(true);return;}
    setCurrent(s[t]);setShowing2(true);setResponded(false);
    nbackTimersRef.current.push(setTimeout(()=>{
      setShowing2(false);
      nbackTimersRef.current.push(setTimeout(()=>{
        const isMatch=t>=n&&s[t]===s[t-n];
        setMisses(m=>m+(isMatch?1:0));
        setTrial(t+1);
        runTrial(s,t+1,n);
      },400));
    },1000));
  };

  useEffect(()=>{
    clearNbackTimers();
    const s=makeSeq(currentRound.trials);
    seqRef.current=s;setSeqSet(s);setTrial(0);setHits(0);setMisses(0);setDone2(false);setResponded(false);
    runTrial(s,0,currentRound.n);
    return ()=>clearNbackTimers();
  },[roundIdx]);

  useEffect(()=>{
    if(done2){
      completeRound(hits,Math.max(1,currentRound.trials-currentRound.n));
    }
  },[done2]);

  const respond=()=>{
    if(responded) return;
    const t=trial;
    const isMatch=t>=currentRound.n&&seqRef.current[t]===seqRef.current[t-currentRound.n];
    setResponded(true);
    if(isMatch){setHits(h=>h+1);setMisses(m=>Math.max(0,m-1));}
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('🎯','N-Back Complete!');

  return React.createElement('div',{style:{textAlign:'center'}},
    React.createElement(RoundHeader,{roundIdx,totalRounds:ROUND_SPECS.length,label:currentRound.label,score,color:'#6C63FF'}),
    React.createElement('div',{style:{color:'#555',fontSize:12,marginBottom:16}},
      `Press MATCH if this letter appeared ${currentRound.n} step${currentRound.n>1?'s':''} ago`),
    React.createElement('div',{style:{width:100,height:100,borderRadius:16,background:showing?'#6C63FF22':'#151928',
      border:`3px solid ${showing?'#6C63FF':'#2a2f4a'}`,display:'flex',alignItems:'center',justifyContent:'center',
      margin:'0 auto 20px',transition:'all 0.2s'}},
      React.createElement('span',{style:{fontSize:config.large?52:44,fontWeight:800,color:showing?'#9b95ff':'#333',fontFamily:'monospace'}},showing?current:'')
    ),
    React.createElement('button',{onClick:respond,disabled:responded,
      style:{padding:'12px 28px',background:responded?'#1e2235':'linear-gradient(135deg,#6C63FF,#4ECDC4)',
        border:`2px solid ${responded?'#2a2f4a':'#6C63FF'}`,borderRadius:14,color:responded?'#333':'#fff',
        fontWeight:700,cursor:responded?'default':'pointer',fontSize:15,transition:'all 0.2s'}},'✓ Match'),
    React.createElement('div',{style:{marginTop:12,color:'#555',fontSize:12}},
      `Trial ${trial}/${currentRound.trials} · Hits: ${hits}`)
  );
}

function SentenceBuilder({ config, onComplete }) {
  const SENTENCES = [
    {words:["The","cat","sat"],            answer:"The cat sat"},
    {words:["The","sky","is","blue"],      answer:"The sky is blue"},
    {words:["She","loves","ice","cream"],  answer:"She loves ice cream"},
    {words:["The","rain","falls","gently","down"],      answer:"The rain falls gently down"},
    {words:["She","plays","the","piano","well"],         answer:"She plays the piano well"},
    {words:["He","walks","to","school","every","day"],   answer:"He walks to school every day"},
    {words:["She","always","greets","people","with","a","smile"], answer:"She always greets people with a smile"},
    {words:["Reading","books","is","the","key","to","expanding","knowledge"], answer:"Reading books is the key to expanding knowledge"},
  ];

  const ROUND_SPECS = config.roundSpecs || SENTENCES.map((s,i) => ({
    label: s.words.length + '-word sentence — round ' + (i+1)
  }));

  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } =
    useProgression(ROUND_SPECS, onComplete);

  // Derive sentence directly — no useState for sentence or wordSet
  const sentence = SENTENCES[Math.min(roundIdx, SENTENCES.length - 1)];

  const [placed,   setPlaced]   = useState([]);
  const [wordSet,  setWordSet]  = useState(() => [...sentence.words].sort(() => Math.random() - 0.5));
  const [feedback, setFeedback] = useState(null);
  const [prevRound, setPrevRound] = useState(0);

  // Reset when round changes
  if (roundIdx !== prevRound) {
    const s = SENTENCES[Math.min(roundIdx, SENTENCES.length - 1)];
    setPrevRound(roundIdx);
    setPlaced([]);
    setFeedback(null);
    setWordSet([...s.words].sort(() => Math.random() - 0.5));
  }

  const usedIdx = placed.map(p => p.wi);

  const addWord = (word, wi) => {
    if (feedback) return;
    setPlaced(p => [...p, { word, wi }]);
  };

  const removeWord = (i) => {
    if (feedback) return;
    setPlaced(p => p.filter((_, j) => j !== i));
  };

  const check = () => {
    const attempt = placed.map(p => p.word).join(' ');
    const ok = attempt === sentence.answer;
    setFeedback(ok ? 'correct' : 'wrong');
    setTimeout(() => completeRound(ok ? 1 : 0, 1), 1100);
  };

  if (phase === 'transition') return renderTransition();
  if (phase === 'done')       return renderDone('📝', 'Sentence Builder Complete!');

  return React.createElement('div', null,
    React.createElement(RoundHeader, { roundIdx, totalRounds: ROUND_SPECS.length, label: currentRound.label, score, color: '#4ECDC4' }),
    React.createElement('div', { style: { color: '#888', fontSize: 12, marginBottom: 8, textAlign: 'center' } },
      'Arrange ' + sentence.words.length + ' words into the correct sentence'
    ),
    // Drop zone
    React.createElement('div', {
      style: {
        minHeight: 52, background: '#1e2235',
        border: '2px dashed ' + (feedback === 'correct' ? '#4ECDC4' : feedback === 'wrong' ? '#FF6B6B' : '#2a2f4a'),
        borderRadius: 12, padding: '10px', marginBottom: 14,
        display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center'
      }
    },
      placed.length === 0
        ? React.createElement('span', { style: { color: '#333', fontSize: 13 } }, 'Tap words below to build the sentence...')
        : placed.map((p, i) =>
            React.createElement('span', {
              key: i, onClick: () => removeWord(i),
              style: {
                padding: '6px 12px', background: '#6C63FF33', border: '1px solid #6C63FF',
                borderRadius: 8, color: '#9b95ff', cursor: 'pointer',
                fontSize: config.large ? 15 : 13, fontWeight: 600
              }
            }, p.word)
          )
    ),
    // Word bank
    React.createElement('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 } },
      wordSet.map((word, wi) =>
        !usedIdx.includes(wi)
          ? React.createElement('button', {
              key: wi, onClick: () => addWord(word, wi),
              style: {
                padding: '8px 14px', background: '#1e2235', border: '2px solid #2a2f4a',
                borderRadius: 8, color: '#e0e0ff', cursor: 'pointer',
                fontSize: config.large ? 15 : 13, fontWeight: 600
              }
            }, word)
          : React.createElement('button', {
              key: wi, disabled: true,
              style: {
                padding: '8px 14px', background: 'transparent',
                border: '2px dashed #1e2235', borderRadius: 8,
                color: 'transparent', fontSize: 13
              }
            }, word)
      )
    ),
    // Buttons
    placed.length > 0 && !feedback && React.createElement('div', { style: { display: 'flex', gap: 8 } },
      React.createElement('button', {
        onClick: check,

function TimelineSort({ config, onComplete }) {
  const ALL_SETS=[
    {events:["🏺 Ancient Egypt (~3000 BC)","🏛️ Roman Empire (27 BC)","🧭 Columbus (1492 AD)","🚀 Moon Landing (1969)"],sorted:[0,1,2,3]},

    {events:["⚽ FIFA founded (1904)","📺 TV invented (1926)","🧬 DNA structure (1953)","📱 First iPhone (2007)"],sorted:[0,1,2,3]},
    {events:["🗼 Eiffel Tower (1889)","🎬 Cinema invented (1895)","✈️ First powered flight (1903)","📻 Radio broadcast (1906)"],sorted:[0,1,2,3]},
    {events:["🌋 Pompeii buried (79 AD)","📖 First printed Bible (1455)","🌎 America discovered (1492)","🔭 Galileo's telescope (1609)"],sorted:[0,1,2,3]},
    {events:["🏺 Great Wall begun (7th BC)","🏟️ Colosseum built (80 AD)","🕌 Taj Mahal (1632)","🗽 Statue of Liberty (1886)"],sorted:[0,1,2,3]},
  ];
  const ROUND_SPECS=ALL_SETS.map((_,i)=>({setIdx:i,label:`Timeline ${i+1}`}));
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const set=ALL_SETS[currentRound.setIdx];
  const [order,setOrder]=useState(()=>[...set.events].sort(()=>Math.random()-0.5));
  const [selected,setSelected]=useState(null);
  const [checked,setChecked]=useState(false);

  useEffect(()=>{setOrder([...ALL_SETS[currentRound.setIdx].events].sort(()=>Math.random()-0.5));setSelected(null);setChecked(false);},[roundIdx]);

  const tap=(i)=>{
    if(checked) return;
    if(selected===null){setSelected(i);}
    else if(selected===i){setSelected(null);}
    else{const arr=[...order];[arr[selected],arr[i]]=[arr[i],arr[selected]];setOrder(arr);setSelected(null);}
  };

  const check=()=>{
    const correct=order.every((e,i)=>e===set.events[i]);
    setChecked(true);
    setTimeout(()=>completeRound(correct?1:0,1),1100);
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('📅','Timeline Complete!');

  return React.createElement('div',null,
    React.createElement(RoundHeader,{roundIdx,totalRounds:8,label:currentRound.label,score,color:'#FFB347'}),
    React.createElement('div',{style:{color:'#4ECDC4',fontSize:13,fontWeight:600,marginBottom:12,textAlign:'center'}},'Tap two events to swap — oldest first'),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:14}},
      ...order.map((e,i)=>{
        const isCorrect=checked&&e===set.events[i];
        const isWrong=checked&&e!==set.events[i];
        return React.createElement('div',{key:i,onClick:()=>tap(i),
          style:{padding:'12px 14px',background:selected===i?'#FFB34722':isCorrect?'#4ECDC422':isWrong?'#FF6B6B22':'#1e2235',
            border:`2px solid ${selected===i?'#FFB347':isCorrect?'#4ECDC4':isWrong?'#FF6B6B':'#2a2f4a'}`,
            borderRadius:12,color:'#e0e0ff',fontSize:config.large?14:12,cursor:checked?'default':'pointer',
            display:'flex',alignItems:'center',gap:8,transition:'all 0.2s'}},
          React.createElement('span',{style:{color:'#555',fontWeight:700,width:20}},(i+1)+'.'),
          e);
      })
    ),
    !checked&&React.createElement('button',{onClick:check,
      style:{width:'100%',padding:'11px',background:'linear-gradient(135deg,#FFB347,#FF6B6B)',border:'none',borderRadius:12,color:'#0a0e1a',fontWeight:700,cursor:'pointer'}},'✓ Check Order')
  );
}

  ];

  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

function CategoryFluency({ config, onComplete }) {
  const CATS=[
    {category:"🐾 Animals",  valid:["Dog","Cat","Lion","Tiger","Elephant","Giraffe","Zebra","Bear","Wolf","Fox"],invalid:["Apple","Chair","Cloud","Book","River"]},
    {category:"🍎 Fruits",   valid:["Apple","Banana","Mango","Grape","Orange","Strawberry","Pineapple","Watermelon","Peach","Cherry"],invalid:["Carrot","Dog","Table","Pen","Stone"]},
    {category:"🎨 Colours",  valid:["Red","Blue","Green","Yellow","Orange","Purple","Pink","Brown","White","Black"],invalid:["Tall","Happy","Quick","Loud","Soft"]},
    {category:"🌍 Countries",valid:["India","France","Brazil","Japan","Germany","Australia","Canada","Italy","Spain","Mexico"],invalid:["Paris","London","Mountain","River","Ocean"]},
    {category:"⚽ Sports",   valid:["Cricket","Football","Tennis","Basketball","Swimming","Boxing","Golf","Rugby","Baseball","Volleyball"],invalid:["Chess","Cooking","Reading","Painting","Writing"]},
    {category:"🎵 Instruments",valid:["Guitar","Piano","Violin","Drums","Flute","Trumpet","Saxophone","Cello","Harp","Clarinet"],invalid:["Singing","Dancing","Painting","Writing","Running"]},
    {category:"🔬 Elements", valid:["Oxygen","Hydrogen","Carbon","Nitrogen","Gold","Silver","Iron","Copper","Helium","Neon"],invalid:["Water","Salt","Bronze","Steel","Air"]},
    {category:"🧠 Psychology",valid:["Cognition","Perception","Empathy","Anxiety","Depression","Resilience","Attachment","Motivation","Inhibition","Memory"],invalid:["Diagnosis","Treatment","Medicine","Surgery","Biology"]},
  ];
  const TIMES=[35,30,28,28,25,25,22,20];
  const ROUND_SPECS=CATS.map((c,i)=>({cIdx:i,time:TIMES[i],label:`${c.category} (${TIMES[i]}s)`}));
  const { currentRound, roundIdx, score, phase, completeRound, renderTransition, renderDone } = useProgression(ROUND_SPECS, onComplete);

  const cat=CATS[currentRound.cIdx];
  const [timeLeft,setTimeLeft]=useState(currentRound.time);
  const [phase2,setPhase2]=useState('play');
  const [words,setWords]=useState(()=>[...cat.valid.slice(0,8),...cat.invalid.slice(0,4)].sort(()=>Math.random()-0.5).map(w=>({word:w,tapped:false,correct:null})));
  const [roundScore,setRoundScore]=useState(0);

  useEffect(()=>{
    const c=CATS[currentRound.cIdx];
    setWords([...c.valid.slice(0,8),...c.invalid.slice(0,4)].sort(()=>Math.random()-0.5).map(w=>({word:w,tapped:false,correct:null})));
    setTimeLeft(currentRound.time); setPhase2('play'); setRoundScore(0);
  },[roundIdx]);

  useEffect(()=>{
    if(phase2!=='play') return;
    if(timeLeft<=0){
      const correct=words.filter(w=>w.tapped&&cat.valid.includes(w.word)).length;
      const wrong=words.filter(w=>w.tapped&&!cat.valid.includes(w.word)).length;
      setPhase2('done');
      completeRound(Math.max(0,correct-wrong),8);
      return;
    }
    const t=setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[phase2,timeLeft]);

  const finishEarly=()=>{
    if(phase2!=='play') return;
    const correct=words.filter(w=>w.tapped&&cat.valid.includes(w.word)).length;
    const wrong=words.filter(w=>w.tapped&&!cat.valid.includes(w.word)).length;
    setPhase2('done');
    completeRound(Math.max(0,correct-wrong),8);
  };

  const tap=(i)=>{
    if(phase2!=='play') return;
    setWords(prev=>{
      const arr=[...prev];
      if(arr[i].tapped) return arr;
      const isValid=CATS[currentRound.cIdx].valid.includes(arr[i].word);
      arr[i]={...arr[i],tapped:true,correct:isValid};
      setRoundScore(s=>s+(isValid?1:-1));
      return arr;
    });
  };

  if(phase==='transition') return renderTransition();
  if(phase==='done')       return renderDone('⏱️','Category Fluency Complete!');

  const timerColor=timeLeft>15?'#4ECDC4':timeLeft>8?'#FFB347':'#FF6B6B';
  return React.createElement('div',null,
    React.createElement(RoundHeader,{roundIdx,totalRounds:8,label:currentRound.label,score,color:'#4ECDC4'}),
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
      React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'#fff'}},cat.category),
      React.createElement('div',{style:{fontSize:20,fontWeight:800,color:timerColor}},`${timeLeft}s`)
    ),
    phase2==='play'&&React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
      React.createElement('div',{style:{color:'#aaa',fontSize:12}},'Tap ONLY words in this category!'),
      React.createElement('button',{onClick:finishEarly,style:{padding:'5px 12px',background:'#4ECDC422',border:'1px solid #4ECDC4',borderRadius:8,color:'#4ECDC4',cursor:'pointer',fontSize:12,fontWeight:600}},'✓ Done')
    ),
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}},
      ...words.map((w,i)=>{
        let bg='#1e2235',border='#2a2f4a',color='#e0e0ff';
        if(w.tapped){bg=w.correct?'#4ECDC422':'#FF6B6B22';border=w.correct?'#4ECDC4':'#FF6B6B';color=w.correct?'#4ECDC4':'#FF6B6B';}
        return React.createElement('button',{key:i,onClick:()=>tap(i),
          style:{padding:'9px 14px',background:bg,border:`2px solid ${border}`,borderRadius:20,color,
            fontSize:config.large?15:13,cursor:w.tapped||phase2!=='play'?'default':'pointer',fontWeight:600,transition:'all 0.2s'}},
          w.tapped?(w.correct?'✓ ':'✗ ')+w.word:w.word);
      })
    )
  );
}
